<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ΕΛ.ΑΣ. | Πλήρης Διαχείριση με Πειθαρχικά</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* Loading screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b1a30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1s ease;
      opacity: 1;
      pointer-events: all;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-spinner {
      font-size: 5rem;
      color: #fbbf24;
      animation: spin 2s infinite linear;
    }
    .loading-text {
      margin-top: 20px;
      font-size: 1.5rem;
      color: #e4c580;
      font-weight: 500;
      letter-spacing: 2px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ίδια στυλ με προηγούμενο (διατηρούμε όλο το CSS) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
      color: #1e293b;
      line-height: 1.5;
      min-height: 100vh;
      padding: 24px;
    }
    .app { max-width: 1400px; margin: 0 auto; display: flex; gap: 24px; }
    .main-content {
      flex: 1;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      overflow: hidden;
    }
    .site-header {
      background: linear-gradient(135deg, #0b2b44 0%, #123b5e 100%);
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid #fbbf24;
    }
    .logo { display: flex; align-items: center; gap: 16px; }
    .logo i { font-size: 2.5rem; color: #fcd34d; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
    .logo-text h1 {
      font-size: 1.8rem; font-weight: 700; color: white; letter-spacing: -0.02em;
    }
    .logo-text h1 span { color: #fbbf24; font-weight: 300; margin-left: 6px; }
    .logo-text .subhead { color: #b8d4f0; font-size: 0.9rem; font-weight: 500; letter-spacing: 1px; }
    .rank-tag {
      background: rgba(255,215,120,0.15); backdrop-filter: blur(4px);
      padding: 8px 22px; border-radius: 60px; border: 1px solid #fbbf24;
      font-weight: 600; color: #fef3c7; font-size: 1rem;
      box-shadow: inset 0 0 12px rgba(250,204,21,0.2);
    }
    .rank-tag i { margin-right: 8px; color: #fbbf24; }
    .nav-tabs {
      background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
      padding: 0.75rem 2.5rem 0; border-bottom: 1px solid rgba(203,213,225,0.5);
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .nav-tab {
      padding: 0.8rem 1.8rem; font-weight: 600; font-size: 0.95rem; color: #334155;
      border-radius: 30px 30px 0 0; background: transparent; cursor: pointer;
      transition: all 0.2s; border: 1px solid transparent; border-bottom: none;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .nav-tab i { color: #5f7d9c; }
    .nav-tab:hover { background: rgba(255,255,255,0.9); color: #0b2b44; }
    .nav-tab.active {
      background: white; border-color: #cbd5e1; border-bottom: 2px solid white;
      margin-bottom: -1px; color: #1e3a8a; font-weight: 700;
      box-shadow: 0 -4px 8px rgba(0,0,0,0.02);
    }
    .nav-tab.active i { color: #fbbf24; }
    .content-area { padding: 2.5rem; background: white; }
    .page { display: none; animation: fade 0.25s ease; }
    .page.active-page { display: block; }
    @keyframes fade { from { opacity: 0.3; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    h2 {
      font-size: 2.2rem; font-weight: 700; color: #0c2b4a;
      border-left: 8px solid #fbbf24; padding-left: 1.5rem; margin-bottom: 2rem;
    }
    .protocol-card { background: #f8fafc; border-radius: 28px; padding: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 8px 20px -8px rgba(0,20,40,0.1); }
    .site-footer { background: #0f1f30; color: #b0c9e0; padding: 1.5rem 2.5rem; display: flex; justify-content: space-between; border-top: 2px solid #fbbf24; }

    /* ADMIN PANEL */
    .admin-panel {
      width: 500px;
      background: rgba(18, 28, 40, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      color: #f0f4fa;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: fit-content;
    }
    .admin-header {
      padding: 24px 24px 16px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid #334e68;
    }
    .admin-header h3 {
      font-size: 1.6rem; font-weight: 600; color: #fbbf24;
      display: flex; align-items: center; gap: 12px;
    }
    .admin-header p { color: #9ab3d1; margin-top: 6px; font-size: 0.9rem; }
    .admin-content {
      padding: 20px;
      overflow-y: auto;
      max-height: 70vh;
      scrollbar-width: thin;
      scrollbar-color: #fbbf24 #1e2f40;
    }
    .admin-content::-webkit-scrollbar { width: 8px; }
    .admin-content::-webkit-scrollbar-track { background: #1e2f40; border-radius: 10px; }
    .admin-content::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }

    .admin-section {
      margin-bottom: 32px;
      border-bottom: 1px dashed #3e5a73;
      padding-bottom: 24px;
    }
    .admin-section h4 {
      color: #fcd34d;
      font-size: 1.2rem;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* category cards */
    .categories-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 10px;
    }
    .category-card {
      background: #1f2f40;
      border-radius: 24px;
      padding: 20px;
      border: 1px solid #4d6883;
      box-shadow: 0 10px 20px -8px rgba(0,0,0,0.4);
      transition: all 0.2s;
    }
    .category-card:hover {
      border-color: #fbbf24;
      box-shadow: 0 12px 24px -8px #fbbf2430;
    }
    .category-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .category-title-input {
      flex: 2;
      min-width: 200px;
      background: #0f1f30;
      border: 1px solid #5b7da0;
      color: white;
      padding: 12px 18px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
    }
    .category-select {
      background: #0f1f30;
      border: 1px solid #5b7da0;
      color: white;
      padding: 12px 18px;
      border-radius: 40px;
      font-size: 0.95rem;
    }
    .visibility-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f1f30;
      padding: 5px 15px;
      border-radius: 40px;
      border: 1px solid #5b7da0;
    }
    .visibility-toggle label {
      color: #b3cef0;
      font-size: 0.9rem;
    }
    .visibility-toggle input {
      width: 18px;
      height: 18px;
      accent-color: #fbbf24;
    }
    .category-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    .category-btn {
      width: 42px;
      height: 42px;
      border-radius: 42px;
      border: none;
      background: #2d4055;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .category-btn:hover {
      background: #3e5670;
      transform: scale(1.05);
    }
    .category-btn.delete {
      background: #a13d3d;
    }
    .category-btn.delete:hover {
      background: #c03939;
    }
    .category-btn.move {
      background: #3a4e66;
    }

    /* περιεχόμενο κατηγορίας */
    .content-textarea {
      width: 100%;
      background: #132433;
      border: 1px solid #3d5a78;
      border-radius: 24px;
      padding: 16px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 150px;
      margin-top: 8px;
    }
    .content-textarea:focus {
      outline: none;
      border-color: #fbbf24;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.2);
    }

    /* officers grid (για τύπο personnel) */
    .officers-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }
    .officer-card {
      background: #1b2b3b;
      border-radius: 20px;
      padding: 16px;
      border: 1px solid #4a6a8a;
    }
    .officer-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .officer-fields input,
    .officer-fields select {
      background: #0f1f30;
      border: 1px solid #5b7da0;
      color: white;
      padding: 10px 16px;
      border-radius: 30px;
      font-family: 'Inter', sans-serif;
    }
    .officer-fields select option {
      background: #1f2f40;
    }
    .officer-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .add-officer-btn {
      background: #2a5f2a;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }

    /* penalties grid (για τύπο penalties) */
    .penalties-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }
    .penalty-item {
      background: #1b2b3b;
      border-radius: 20px;
      padding: 16px;
      border: 1px solid #4a6a8a;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .penalty-name-input {
      flex: 2;
      background: #0f1f30;
      border: 1px solid #5b7da0;
      color: white;
      padding: 10px 16px;
      border-radius: 30px;
    }
    .penalty-checkboxes {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .penalty-checkbox {
      width: 40px;
      height: 40px;
      background: #0f1f30;
      border: 2px solid #5b7da0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      transition: 0.2s;
    }
    .penalty-checkbox.active {
      background: #a13d3d;
      border-color: #fbbf24;
      color: white;
    }
    .penalty-actions {
      display: flex;
      gap: 8px;
    }
    .add-penalty-btn {
      background: #2a5f2a;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }

    .add-category-btn {
      background: #2a5f2a;
      color: white;
      border: none;
      padding: 16px 20px;
      border-radius: 60px;
      width: 100%;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px 0 10px;
      transition: 0.2s;
    }
    .add-category-btn:hover {
      background: #1f7a1f;
      transform: scale(1.02);
    }

    /* φωτογραφίες */
    .photos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
    }
    .photo-item {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      border: 2px solid #fbbf24;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .delete-photo-btn {
      position: absolute; top: 4px; right: 4px;
      background: #b91c1c; color: white; border: none;
      width: 28px; height: 28px; border-radius: 28px;
      font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.9; transition: 0.2s;
    }
    .delete-photo-btn:hover { background: #dc2626; transform: scale(1.1); }
    .photo-upload-tool-admin {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .photo-upload-tool-admin input {
      flex: 1; background: #263b50; border: 1px solid #4f6887;
      border-radius: 40px; padding: 12px 18px; color: white;
    }
    .photo-upload-tool-admin button {
      background: #1d3e63; color: white; border: none;
      padding: 0 24px; border-radius: 40px; font-weight: 600;
      cursor: pointer; border: 1px solid #fbbf24; transition: 0.2s;
    }
    .photo-upload-tool-admin button:hover { background: #2c527c; }

    /* auth bar */
    .auth-bar {
      background: #eef2f6; padding: 12px 25px;
      display: flex; align-items: center; justify-content: flex-end; gap: 16px;
      border-bottom: 1px solid #cbd6e4;
    }
    .auth-status {
      font-size: 0.95rem; color: #1e3b5c; background: white;
      padding: 6px 18px; border-radius: 40px; border: 1px solid #b0c4db;
    }
    .auth-btn {
      background: #1d3e63; border: none; color: white; padding: 8px 24px;
      border-radius: 40px; font-weight: 600; cursor: pointer;
      border: 1px solid #fbbf24; font-size: 0.95rem; transition: 0.2s;
    }
    .auth-btn.logout { background: #5e4c38; border-color: #a69b87; }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); }

    /* modal login */
    .login-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; visibility: hidden; opacity: 0; transition: 0.2s;
    }
    .login-modal.show { visibility: visible; opacity: 1; }
    .login-card {
      background: white; max-width: 400px; width: 90%; padding: 40px;
      border-radius: 60px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      text-align: center;
    }
    .login-card h3 { margin-bottom: 24px; color: #0b1a30; font-size: 1.8rem; }
    .login-card input {
      width: 100%; padding: 16px 20px; margin-bottom: 16px;
      border: 2px solid #dde3ec; border-radius: 60px; font-size: 1rem;
    }
    .login-card button {
      background: #1d3e63; color: white; border: none; padding: 16px;
      border-radius: 60px; font-weight: 700; width: 100%; cursor: pointer; font-size: 1.1rem;
    }
    .login-card .error { color: #b02e2e; margin-top: 16px; }

    /* officer cards στην προβολή */
    .officer-display-card {
      background: white;
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .officer-display-card .name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0c2b4a;
    }
    .officer-display-card .rank {
      font-size: 1.1rem;
      color: #fbbf24;
      font-weight: 600;
    }
    .officer-display-card .discord {
      background: #f1f5f9;
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-block;
      align-self: flex-start;
    }

    /* penalties display */
    .penalties-table {
      width: 100%;
      border-collapse: collapse;
    }
    .penalties-table th {
      text-align: left;
      padding: 12px;
      background: #f1f5f9;
      color: #0c2b4a;
    }
    .penalties-table td {
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    .penalty-x {
      color: #b91c1c;
      font-weight: bold;
      font-size: 1.2rem;
    }
    @media (max-width: 1000px) { .app { flex-direction: column; } }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="loading-spinner">
      <i class="fas fa-shield-halded"></i>
    </div>
    <div class="loading-text">ΕΛ.ΑΣ. FiveM RP</div>
  </div>

  <div class="app">
    <!-- ΚΥΡΙΑ ΠΡΟΒΟΛΗ -->
    <div class="main-content">
      <div class="auth-bar">
        <span class="auth-status" id="authStatus">Μη συνδεδεμένος</span>
        <button class="auth-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Σύνδεση Admin</button>
        <button class="auth-btn logout" id="logoutBtn" style="display:none;"><i class="fas fa-sign-out-alt"></i> Αποσύνδεση</button>
      </div>
      <header class="site-header">
        <div class="logo">
          <i class="fas fa-shield-halded"></i>
          <div class="logo-text">
            <h1><span id="cover-badge-pre">ΕΛΛΗΝΙΚΗ ΑΣΤΥΝΟΜΙΑ</span> <span id="cover-span-pre">FIVEM RP</span></h1>
            <div class="subhead" id="cover-subhead-pre">ΠΡΩΤΟΚΟΛΛΟ · ΚΑΝΟΝΙΣΜΟΣ · ΔΕΟΝΤΟΛΟΓΙΑ</div>
          </div>
        </div>
        <div class="rank-tag" id="cover-rank-pre"><i class="fas fa-star"></i> ΤΑΞΙΑΡΧΟΣ Δ. ΓΕΩΡΓΑΝΤΖΕΛΗΣ</div>
      </header>
      <div class="nav-tabs" id="navTabs"></div>
      <div class="content-area" id="contentArea"></div>
      <footer class="site-footer">
        <span id="footer-left-pre">ΕΛ.ΑΣ. FiveM RP – Πρωτόκολλο</span>
        <span id="footer-right-pre">Έκδοση 1.0 | Ταξίαρχος Δ. Γεωργαντζέλης</span>
      </footer>
    </div>

    <!-- ΠΛΑΪΝΗ ΜΠΑΡΑ ADMIN -->
    <div class="admin-panel" id="adminPanel" style="display: none;">
      <div class="admin-header">
        <h3><i class="fas fa-crown"></i> Πίνακας Διαχειριστή</h3>
        <p>Διαχείριση κατηγοριών, προσωπικού, πειθαρχικών και φωτογραφιών</p>
      </div>
      <div class="admin-content" id="adminContent"></div>
    </div>
  </div>

  <!-- Modal σύνδεσης -->
  <div class="login-modal" id="loginModal">
    <div class="login-card">
      <h3><i class="fas fa-lock"></i> Σύνδεση</h3>
      <input type="email" id="loginEmail" placeholder="Email" value="admin@example.com">
      <input type="password" id="loginPassword" placeholder="Κωδικός">
      <button id="submitLogin">Σύνδεση</button>
      <p class="error" id="loginError"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCM8zk9I3LOy9VGAqmIgpyDcjes3HWtvYA",
      authDomain: "policefivem-e368f.firebaseapp.com",
      projectId: "policefivem-e368f",
      storageBucket: "policefivem-e368f.firebasestorage.app",
      messagingSenderId: "553518888871",
      appId: "1:553518888871:web:033e7d3ba25da5e1386882"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const contentDocRef = doc(db, "policeSite", "content");

    // Λίστα βαθμών για το dropdown
    const rankOptions = [
      "Ταξίαρχος",
      "Αστυνομικός Διευθυντής",
      "Αστυνομικός Υποδιευθυντής",
      "Αστυνόμος Α’",
      "Αστυνόμος Β’",
      "Υπαστυνόμος Α’",
      "Υπαστυνόμος Β’",
      "Ανθυπαστυνόμος",
      "Αρχιφύλακας",
      "Υπαρχιφύλακας",
      "Αστυφύλακας",

    // Μετατροπή plain text σε HTML (για text categories)
    function textToHTML(text) {
      if (!text) return '';
      const lines = text.split('\n');
      let inList = false;
      let html = '';
      for (let line of lines) {
        line = line.trim();
        if (line === '') {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }
        if (line.startsWith('- ') || line.startsWith('* ')) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${line.substring(2)}</li>`;
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          const numberedMatch = line.match(/^(\d+)\.\s+(.*)/);
          if (numberedMatch) {
            html += `<ol><li>${numberedMatch[2]}</li></ol>`;
          } else {
            html += `<p>${line}</p>`;
          }
        }
      }
      if (inList) html += '</ul>';
      return html;
    }

          // Συγχώνευση με default για να έχουμε όλα τα απαραίτητα πεδία
          siteContent = {
            cover: { ...defaultContent.cover, ...(data.cover || {}) },
            categories: Array.isArray(data.categories) 
              ? data.categories.map(c => ({
                  type: c.type || 'text',
                  visibility: c.visibility || 'public',
                  officers: c.officers || [],
                  penalties: c.penalties || [], // νέο πεδίο για πειθαρχικά
                  ...c
                })) 
              : defaultContent.categories,
            photos: Array.isArray(data.photos) ? data.photos : defaultContent.photos,
            footer: { ...defaultContent.footer, ...(data.footer || {}) }
          };
        } else {
          // πρώτη φορά: αποθηκεύουμε default
          await setDoc(contentDocRef, defaultContent);
        }
      } catch (e) {
        console.error("Firebase load error, using default", e);
      }
      renderMain();
      if (isAdmin) renderAdminPanel();
    }

          card.appendChild(officersDiv);
          card.appendChild(addBtn);
        } else if (cat.type === 'penalties') {
          // Διαχείριση πειθαρχικών
          const penalties = cat.penalties || [];
          const penaltiesDiv = document.createElement('div');
          penaltiesDiv.className = 'penalties-grid';

          penalties.forEach((p, pIndex) => {
            const pItem = document.createElement('div');
            pItem.className = 'penalty-item';

            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.className = 'penalty-name-input';
            nameInput.placeholder = 'Όνομα';
            nameInput.value = p.name || '';
            nameInput.addEventListener('input', (e) => {
              p.name = e.target.value;
              renderMain();
              saveToFirebase();
            });

            const checkboxesDiv = document.createElement('div');
            checkboxesDiv.className = 'penalty-checkboxes';

            // Τρεις στήλες
            [1,2,3].forEach(col => {
              const box = document.createElement('div');
              box.className = `penalty-checkbox ${p['p'+col] ? 'active' : ''}`;
              box.textContent = p['p'+col] ? '✗' : '';
              box.addEventListener('click', () => {
                p['p'+col] = !p['p'+col];
                renderMain();
                saveToFirebase();
                renderAdminPanel(); // ανανέωση για ενημέρωση της κλάσης
              });
              checkboxesDiv.appendChild(box);
            });

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'penalty-actions';
            
            // Κουμπιά μετακίνησης
            if (pIndex > 0) {
              const upBtn = document.createElement('button');
              upBtn.className = 'category-btn move';
              upBtn.innerHTML = '<i class="fas fa-arrow-up"></i>';
              upBtn.addEventListener('click', () => {
                const temp = penalties[pIndex];
                penalties[pIndex] = penalties[pIndex-1];
                penalties[pIndex-1] = temp;
                renderMain();
                saveToFirebase();
                renderAdminPanel();
              });
              actionsDiv.appendChild(upBtn);
            }
            if (pIndex < penalties.length - 1) {
              const downBtn = document.createElement('button');
              downBtn.className = 'category-btn move';
              downBtn.innerHTML = '<i class="fas fa-arrow-down"></i>';
              downBtn.addEventListener('click', () => {
                const temp = penalties[pIndex];
                penalties[pIndex] = penalties[pIndex+1];
                penalties[pIndex+1] = temp;
                renderMain();
                saveToFirebase();
                renderAdminPanel();
              });
              actionsDiv.appendChild(downBtn);
            }

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'category-btn delete';
            deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
            deleteBtn.addEventListener('click', () => {
              cat.penalties.splice(pIndex, 1);
              renderMain();
              saveToFirebase();
              renderAdminPanel();
            });
            actionsDiv.appendChild(deleteBtn);

            pItem.appendChild(nameInput);
            pItem.appendChild(checkboxesDiv);
            pItem.appendChild(actionsDiv);
            penaltiesDiv.appendChild(pItem);
          });

          const addBtn = document.createElement('button');
          addBtn.className = 'add-penalty-btn';
          addBtn.innerHTML = '<i class="fas fa-plus-circle"></i> Προσθήκη προσώπου';
          addBtn.addEventListener('click', () => {
            if (!cat.penalties) cat.penalties = [];
            cat.penalties.push({ name: '', p1: false, p2: false, p3: false });
            renderMain();
            saveToFirebase();
            renderAdminPanel();
          });

          card.appendChild(penaltiesDiv);
          card.appendChild(addBtn);
        } else {
          // text category
          const contentLabel = document.createElement('label');
          contentLabel.textContent = 'Περιεχόμενο (απλό κείμενο)';
          contentLabel.style.display = 'block';
          contentLabel.style.marginBottom = '6px';
          contentLabel.style.color = '#b3cef0';
          card.appendChild(contentLabel);

          const textarea = document.createElement('textarea');
          textarea.className = 'content-textarea';
          textarea.value = cat.content || '';
          textarea.addEventListener('input', (e) => {
            cat.content = e.target.value;
            renderMain();
            saveToFirebase();
          });
          card.appendChild(textarea);
        }

        categoriesContainer.appendChild(card);
      });

      const addCatBtn = document.createElement('button');
      addCatBtn.className = 'add-category-btn';
      addCatBtn.innerHTML = '<i class="fas fa-plus-circle"></i> Προσθήκη νέας κατηγορίας';
      addCatBtn.addEventListener('click', () => {
        const newId = 'cat' + Date.now() + Math.random().toString(36).substring(2, 6);
        if (!siteContent.categories) siteContent.categories = [];
        siteContent.categories.push({
          id: newId,
          title: 'Νέα κατηγορία',
          type: 'text',
          visibility: 'public',
          content: 'Περιεχόμενο...'
        });
        renderMain();
        saveToFirebase();
        renderAdminPanel();
      });
      adminContent.appendChild(addCatBtn);

      // Φωτογραφίες
      adminContent.appendChild(sectionTitle('Φωτογραφίες'));
      const photoUploadDiv = document.createElement('div');
      photoUploadDiv.className = 'photo-upload-tool-admin';
      photoUploadDiv.innerHTML = `
        <input type="text" id="adminPhotoUrl" placeholder="URL εικόνας">
        <button id="adminAddPhotoBtn"><i class="fas fa-plus"></i> Προσθήκη</button>
      `;
      adminContent.appendChild(photoUploadDiv);

      const photosGrid = document.createElement('div');
      photosGrid.className = 'photos-grid';
      (siteContent.photos || []).forEach((url, idx) => {
        const photoItem = document.createElement('div');
        photoItem.className = 'photo-item';
        photoItem.innerHTML = `
          <img src="${url}" alt="φωτογραφία">
          <button class="delete-photo-btn" data-index="${idx}"><i class="fas fa-times"></i></button>
        `;
        photosGrid.appendChild(photoItem);
      });
      adminContent.appendChild(photosGrid);

      adminContent.appendChild(sectionTitle('Υποσέλιδο'));
      adminContent.appendChild(field('footer.left', 'Αριστερό κείμενο', siteContent.footer.left));
      adminContent.appendChild(field('footer.right', 'Δεξί κείμενο', siteContent.footer.right));

      // Event listeners φωτογραφιών (πρέπει να είναι μετά την προσθήκη τους στο DOM)
      setTimeout(() => {
        const addPhotoBtn = document.getElementById('adminAddPhotoBtn');
        const photoUrlInput = document.getElementById('adminPhotoUrl');
        if (addPhotoBtn && photoUrlInput) {
          addPhotoBtn.addEventListener('click', () => {
            const url = photoUrlInput.value.trim();
            if (url) {
              if (!siteContent.photos) siteContent.photos = [];
              siteContent.photos.push(url);
              renderMain();
              saveToFirebase();
              renderAdminPanel();
            }
          });
        }
        document.querySelectorAll('.delete-photo-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const index = e.currentTarget.dataset.index;
            siteContent.photos.splice(index, 1);
            renderMain();
            saveToFirebase();
            renderAdminPanel();
          });
        });
      }, 0);
    }

    function sectionTitle(text) {
      const div = document.createElement('div');
      div.className = 'admin-section';
      div.innerHTML = `<h4><i class="fas fa-pen"></i> ${text}</h4>`;
      return div;
    }

    function field(path, label, value) {
      const div = document.createElement('div');
      div.className = 'admin-field';
      const lab = document.createElement('label');
      lab.textContent = label;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = value || '';
      input.dataset.path = path;
      input.addEventListener('input', (e) => {
        const parts = e.target.dataset.path.split('.');
        let obj = siteContent;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!obj[parts[i]]) obj[parts[i]] = {};
          obj = obj[parts[i]];
        }
        obj[parts[parts.length - 1]] = e.target.value;
        renderMain();
        saveToFirebase();
      });
      div.appendChild(lab);
      div.appendChild(input);
      return div;
    }

    // Authentication
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        authStatus.innerHTML = `<i class="fas fa-user-shield"></i> ${user.email}`;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-flex';
        isAdmin = await checkIfAdmin(user.uid);
        if (isAdmin) {
          adminPanel.style.display = 'flex';
          renderAdminPanel();
        } else {
          adminPanel.style.display = 'none';
          authStatus.innerHTML += ' (απλός χρήστης)';
        }
        renderMain();
      } else {
        authStatus.innerHTML = 'Μη συνδεδεμένος';
        loginBtn.style.display = 'inline-flex';
        logoutBtn.style.display = 'none';
        adminPanel.style.display = 'none';
        isAdmin = false;
        renderMain();
      }
    });

    loginBtn.addEventListener('click', () => loginModal.classList.add('show'));
    submitLogin.addEventListener('click', async () => {
      try {
        await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
        loginModal.classList.remove('show');
        loginError.textContent = '';
      } catch (error) {
        loginError.textContent = 'Λάθος email ή κωδικός';
      }
    });
    logoutBtn.addEventListener('click', async () => await signOut(auth));
    loginModal.addEventListener('click', (e) => { if (e.target === loginModal) loginModal.classList.remove('show'); });

    // Αρχική φόρτωση
    loadContent();

    // Fake loading screen: hide after 4 seconds
    setTimeout(() => {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 1000);
      }
    }, 4000);
  </script>
</body>
</html>
