        {
          id: "cat1",
          title: "ΕΙΣΑΓΩΓΗ",
          content: `Η Ελληνική Αστυνομία, στο πλαίσιο του δημοκρατικού πολιτεύματος αποτελεί μία από τις βασικές συνιστώσες του κράτους δικαίου.

      ],
      photos: [ // αρχικές φωτογραφίες
        "https://images.unsplash.com/photo-1585670149965-2c2b5a8e8b9c?w=200&h=150&fit=crop",

      ],

        left: "ΕΛ.ΑΣ. FiveM RP – Πρωτόκολλο Ελληνικής Αστυνομίας",

    const contentArea = document.getElementById('contentArea');
    const saveIndicator = document.getElementById('saveIndicator');

    // Βοηθητική συνάρτηση για ασφαλή ενημέρωση
    function safeSetText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }
    function safeSetHTML(id, value) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = value;
    }

    // Μετατροπή plain text σε HTML (απλή υλοποίηση)
    function textToHTML(text) {
      if (!text) return '';
      const lines = text.split('\n');
      let inList = false;
      let html = '';
      for (let line of lines) {
        line = line.trim();
        if (line === '') {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          continue;
        }
        // Έλεγχος αν είναι λίστα (ξεκινάει με - ή *)
        if (line.startsWith('- ') || line.startsWith('* ')) {
          if (!inList) {
            html += '<ul>';
            inList = true;
          }
          html += `<li>${line.substring(2)}</li>`;
        } else {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          // Έλεγχος αν είναι αριθμημένη λίστα (ξεκινάει με 1. κλπ)
          const numberedMatch = line.match(/^(\d+)\.\s+(.*)/);
          if (numberedMatch) {
            html += `<ol><li>${numberedMatch[2]}</li></ol>`;
          } else {
            html += `<p>${line}</p>`;
          }
        }
      }
      if (inList) html += '</ul>';
      return html;
    }

    // Φόρτωση από Firebase
    async function loadContent() {
      try {
        const snap = await getDoc(contentDocRef);
        if (snap.exists()) {
          const data = snap.data();
          siteContent = {
            cover: { ...defaultContent.cover, ...(data.cover || {}) },
            categories: Array.isArray(data.categories) ? data.categories : defaultContent.categories,
            photos: Array.isArray(data.photos) ? data.photos : defaultContent.photos,
            footer: { ...defaultContent.footer, ...(data.footer || {}) }
          };
        } else {
          // πρώτη φορά: αποθηκεύουμε default
          await setDoc(contentDocRef, defaultContent);
        }
      } catch (e) {
        console.error("Firebase load error, using default", e);
      }
      renderAll();
    }

    // Αποθήκευση (μόνο admin)
    let saveTimeout;
    function saveToFirebase() {
      if (!isAdmin) return;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        try {
          await setDoc(contentDocRef, siteContent);
          if (saveIndicator) {
            saveIndicator.classList.add('show');
            setTimeout(() => saveIndicator.classList.remove('show'), 2000);
          }
        } catch (e) {
          console.error("Firebase save error", e);
        }
      }, 800);
    }

    // Έλεγχος admin
    async function checkIfAdmin(uid) {
      try {
        const adminDoc = await getDoc(doc(db, "admins", uid));
        return adminDoc.exists();
      } catch (e) {
        return false;
      }
    }

    // Ανανέωση προβολής
    function renderAll() {
      // Ενημέρωση στατικών πεδίων
      safeSetText('cover-badge-pre', siteContent.cover.badge || defaultContent.cover.badge);
      safeSetText('cover-span-pre', siteContent.cover.span || defaultContent.cover.span);
      safeSetText('cover-subhead-pre', siteContent.cover.subhead || defaultContent.cover.subhead);
      const rankEl = document.getElementById('cover-rank-pre');
      if (rankEl) rankEl.innerHTML = '<i class="fas fa-star"></i> ' + (siteContent.cover.rank || defaultContent.cover.rank);
      const stickerEl = document.getElementById('cover-sticker-pre');
      if (stickerEl) stickerEl.innerHTML = '<i class="fas fa-certificate"></i> ' + (siteContent.cover.sticker || defaultContent.cover.sticker);
      const quoteEl = document.getElementById('cover-quote-pre');
      if (quoteEl) quoteEl.innerHTML = '<i class="fas fa-quote-right" style="color:#c9a03d;"></i> ' + (siteContent.cover.quote || defaultContent.cover.quote);
      safeSetText('footer-left-pre', siteContent.footer.left || defaultContent.footer.left);
      safeSetText('footer-right-pre', siteContent.footer.right || defaultContent.footer.right);

      if (!navTabs || !contentArea) return;

      navTabs.innerHTML = '';
      contentArea.innerHTML = '';

      const categories = siteContent.categories || [];
      categories.forEach((cat, index) => {
        if (!cat || !cat.id) return;
        // Tab
        const tab = document.createElement('div');
        tab.className = `nav-tab ${index === 0 ? 'active' : ''}`;
        tab.dataset.page = `page-${cat.id}`;
        tab.innerHTML = `<i class="fas fa-file-alt"></i> ${cat.title || 'Ανώνυμο'}`;
        navTabs.appendChild(tab);

        // Page
        const page = document.createElement('div');
        page.id = `page-${cat.id}`;
        page.className = `page ${index === 0 ? 'active-page' : ''}`;
        const htmlContent = textToHTML(cat.content || '');
        page.innerHTML = `<h2>${cat.title || ''}</h2><div class="protocol-card">${htmlContent}</div>`;
        contentArea.appendChild(page);
      });

      // Σελίδα φωτογραφιών
      const photoTab = document.createElement('div');
      photoTab.className = 'nav-tab';
      photoTab.dataset.page = 'page-photos';
      photoTab.innerHTML = '<i class="fas fa-images"></i> ΦΩΤΟΓΡΑΦΙΕΣ';
      navTabs.appendChild(photoTab);

      const photoPage = document.createElement('div');
      photoPage.id = 'page-photos';
      photoPage.className = 'page';

      let uploadHtml = '';
      if (isAdmin) {
        uploadHtml = `
          <div class="photo-upload-tool">
            <i class="fas fa-link"></i>
            <input id="imageUrlInput" placeholder="URL εικόνας">
            <button id="addImageBtn"><i class="fas fa-plus-circle"></i> Προσθήκη</button>
          </div>
        `;
      }

      const photos = siteContent.photos || [];
      const galleryHtml = photos.map(url => `<img src="${url}" class="gallery-img" alt="φωτογραφία">`).join('');

      photoPage.innerHTML = `
        <h2><i class="fas fa-camera-retro"></i> Φωτογραφίες υπηρεσίας</h2>
        ${uploadHtml}
        <div id="gallery-area">${galleryHtml}</div>
      `;
      contentArea.appendChild(photoPage);

      // Ενεργοποίηση tabs
      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', function(e) {
          document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
          this.classList.add('active');
          const targetId = this.dataset.page;
          const targetPage = document.getElementById(targetId);
          if (targetPage) targetPage.classList.add('active-page');
        });
      });

      // Αν δεν υπάρχουν κατηγορίες, ενεργοποιούμε τη σελίδα φωτογραφιών
      if (categories.length === 0) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        const photoTabElem = Array.from(document.querySelectorAll('.nav-tab')).find(t => t.dataset.page === 'page-photos');
        if (photoTabElem) {
          photoTabElem.classList.add('active');
          document.getElementById('page-photos').classList.add('active-page');
        }
      }

      // Αν είμαστε admin, συνδέουμε το κουμπί προσθήκης φωτογραφιών
      if (isAdmin) {
        const addBtn = document.getElementById('addImageBtn');
        const urlInput = document.getElementById('imageUrlInput');
        if (addBtn && urlInput) {
          addBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (url) {
              if (!siteContent.photos) siteContent.photos = [];
              siteContent.photos.push(url);
              renderAll(); // ανανέωση για εμφάνιση της νέας φωτογραφίας
              saveToFirebase();
              urlInput.value = '';
            }
          });
        }
      }
    }

    // Κατασκευή πάνελ επεξεργασίας (με textarea για plain text)
    function buildPanel() {
      const panelDiv = document.getElementById('panelContent');
      if (!panelDiv) return;
      panelDiv.innerHTML = '';

      function sectionTitle(text) {
        const div = document.createElement('div');
        div.className = 'edit-section';
        div.innerHTML = `<h4>${text}</h4>`;
        return div;
      }

      function field(path, label, value, isTextarea = false) {
        const div = document.createElement('div');
        div.className = 'edit-field';
        const lab = document.createElement('label');
        lab.textContent = label;
        let input;
        if (isTextarea) {
          input = document.createElement('textarea');
          input.value = value || '';
          input.style.minHeight = '150px';
        } else {
          input = document.createElement('input');
          input.type = 'text';
          input.value = value || '';
        }
        input.dataset.path = path;
        input.addEventListener('input', (e) => {
          const parts = e.target.dataset.path.split('.');
          let obj = siteContent;
          for (let i = 0; i < parts.length - 1; i++) {
            if (!obj[parts[i]]) obj[parts[i]] = {};
            obj = obj[parts[i]];
          }
          obj[parts[parts.length - 1]] = e.target.value;
          renderAll();
          saveToFirebase();
        });
        div.appendChild(lab);
        div.appendChild(input);
        return div;
      }

      panelDiv.appendChild(sectionTitle('Εξώφυλλο'));
      panelDiv.appendChild(field('cover.badge', 'Κεντρικό κείμενο', siteContent.cover.badge));
      panelDiv.appendChild(field('cover.span', 'Span FIVEM RP', siteContent.cover.span));
      panelDiv.appendChild(field('cover.subhead', 'Υπότιτλος', siteContent.cover.subhead));
      panelDiv.appendChild(field('cover.rank', 'Rank tag', siteContent.cover.rank));
      panelDiv.appendChild(field('cover.sticker', 'Sticker', siteContent.cover.sticker));
      panelDiv.appendChild(field('cover.quote', 'Απόφθεγμα', siteContent.cover.quote));

      panelDiv.appendChild(sectionTitle('Κατηγορίες'));
      const addCatBtn = document.createElement('button');
      addCatBtn.className = 'add-category-btn';
      addCatBtn.innerHTML = '<i class="fas fa-plus"></i> Προσθήκη νέας κατηγορίας';
      addCatBtn.addEventListener('click', () => {
        const newId = 'cat' + Date.now() + Math.random().toString(36).substring(2, 6);
        if (!siteContent.categories) siteContent.categories = [];
        siteContent.categories.push({
          id: newId,
          title: 'Νέα κατηγορία',
          content: 'Περιεχόμενο...'
        });
        renderAll();
        saveToFirebase();
        buildPanel(); // ανανέωση panel
      });
      panelDiv.appendChild(addCatBtn);

      (siteContent.categories || []).forEach((cat) => {
        const catDiv = document.createElement('div');
        catDiv.className = 'category-item';
        
        const header = document.createElement('div');
        header.className = 'category-header';
        const titleInput = document.createElement('input');
        titleInput.value = cat.title || '';
        titleInput.placeholder = 'Τίτλος κατηγορίας';
        titleInput.addEventListener('input', (e) => {
          cat.title = e.target.value;
          renderAll();
          saveToFirebase();
        });
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-cat-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
        deleteBtn.addEventListener('click', () => {
          siteContent.categories = siteContent.categories.filter(c => c.id !== cat.id);
          renderAll();
          saveToFirebase();
          buildPanel();
        });
        header.appendChild(titleInput);
        header.appendChild(deleteBtn);
        catDiv.appendChild(header);

        const contentLabel = document.createElement('label');
        contentLabel.textContent = 'Περιεχόμενο (απλό κείμενο)';
        catDiv.appendChild(contentLabel);
        const contentTextarea = document.createElement('textarea');
        contentTextarea.value = cat.content || '';
        contentTextarea.style.minHeight = '150px';
        contentTextarea.addEventListener('input', (e) => {
          cat.content = e.target.value;
          renderAll();
          saveToFirebase();
        });
        catDiv.appendChild(contentTextarea);
        panelDiv.appendChild(catDiv);
      });

      panelDiv.appendChild(sectionTitle('Υποσέλιδο'));
      panelDiv.appendChild(field('footer.left', 'Αριστερό κείμενο', siteContent.footer.left));
      panelDiv.appendChild(field('footer.right', 'Δεξί κείμενο', siteContent.footer.right));
    }

    // Authentication
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        if (authStatus) authStatus.innerHTML = `<i class="fas fa-user-shield"></i> ${user.email}`;
        if (loginBtn) loginBtn.style.display = 'none';
        if (logoutBtn) logoutBtn.style.display = 'inline-flex';
        isAdmin = await checkIfAdmin(user.uid);
        if (isAdmin) {
          if (toggleEditBtn) toggleEditBtn.classList.add('visible');
        } else {
          if (toggleEditBtn) toggleEditBtn.classList.remove('visible');
          if (authStatus) authStatus.innerHTML += ' (απλός χρήστης)';
        }
        renderAll();
      } else {
        if (authStatus) authStatus.innerHTML = 'Μη συνδεδεμένος';
        if (loginBtn) loginBtn.style.display = 'inline-flex';
        if (logoutBtn) logoutBtn.style.display = 'none';
        if (toggleEditBtn) toggleEditBtn.classList.remove('visible');
        isAdmin = false;
        if (panel) panel.classList.remove('open');
        if (mainView) mainView.classList.remove('shifted');
        renderAll();
      }
    });

    if (loginBtn) {
      loginBtn.addEventListener('click', () => {
        if (loginModal) loginModal.classList.add('show');
      });
    }
    if (submitLogin) {
      submitLogin.addEventListener('click', async () => {
        try {
          await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
          if (loginModal) loginModal.classList.remove('show');
          if (loginError) loginError.textContent = '';
        } catch (error) {
          if (loginError) loginError.textContent = 'Λάθος email ή κωδικός';
        }
      });
    }
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async () => await signOut(auth));
    }
    if (loginModal) {
      loginModal.addEventListener('click', (e) => { if (e.target === loginModal) loginModal.classList.remove('show'); });
    }

    if (toggleEditBtn) {
      toggleEditBtn.addEventListener('click', () => {
        if (!isAdmin) return;
        if (panel) panel.classList.toggle('open');
        if (mainView) mainView.classList.toggle('shifted');
        if (panel && panel.classList.contains('open')) buildPanel();
      });
    }
    if (closePanelBtn) {
      closePanelBtn.addEventListener('click', () => {
        if (panel) panel.classList.remove('open');
        if (mainView) mainView.classList.remove('shifted');
      });
    }

    // Αρχική φόρτωση
    loadContent();
  </script>
</body>
</html>
