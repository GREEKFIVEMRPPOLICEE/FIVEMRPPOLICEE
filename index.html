          id: "cat5",
          title: "TRAFFIC STOP",
          content: "<div class='protocol-card'><p><strong>Τι είναι:</strong> Έλεγχος οχήματος για τροχαία παράβαση ή πιθανή εμπλοκή σε έγκλημα.</p><h3>Διαδικασία:</h3><ol><li>Ενημέρωση ασυρμάτου.</li><li>Κλείδωμα πινακίδας με radar.</li><li>Οδηγός σβήνει μηχανή, κατεβάζει παράθυρα (αν φιμέ, όλα τα τζάμια).</li><li>Κατέβασμα οδηγού, μετακίνηση στο πεζοδρόμιο.</li><li>Ζητάμε στοιχεία, έγγραφα, λόγο ελέγχου.</li><li>Έλεγχος MDT, πινακίδων, ποινικού μητρώου.</li><li>Αναφορά ασυρμάτου «traffic stop υπό έλεγχο».</li></ol></div>"
        }
      ],
      footer: {
        left: "ΕΛ.ΑΣ. FiveM RP – Πρωτόκολλο Ελληνικής Αστυνομίας",
        right: "Έκδοση 1.0 | Ταξίαρχος Δ. Γεωργαντζέλης"
      }
    };

    let siteContent = { ...defaultContent };
    let currentUser = null;
    let isAdmin = false;

    // DOM elements
    const authStatus = document.getElementById('authStatus');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginModal = document.getElementById('loginModal');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const submitLogin = document.getElementById('submitLogin');
    const loginError = document.getElementById('loginError');
    const toggleEditBtn = document.getElementById('togglePanelBtn');
    const panel = document.getElementById('editPanel');
    const mainView = document.getElementById('mainView');
    const closePanelBtn = document.getElementById('closePanelBtn');
    const navTabs = document.getElementById('navTabs');
    const contentArea = document.getElementById('contentArea');

    // Έλεγχος admin
    async function checkIfAdmin(uid) {
      try {
        const adminDoc = await getDoc(doc(db, "admins", uid));
        return adminDoc.exists();
      } catch (e) {
        return false;
      }
    }

    // Φόρτωση από Firebase
    async function loadContent() {
      try {
        const snap = await getDoc(contentDocRef);
        if (snap.exists()) {
          siteContent = snap.data();
        } else {
          await setDoc(contentDocRef, defaultContent);
        }
      } catch (e) {
        console.warn("Firebase load failed, using default", e);
      }
      renderAll();
    }

    // Αποθήκευση (μόνο admin)
    let saveTimeout;
    function saveToFirebase() {
      if (!isAdmin) return;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        try {
          await setDoc(contentDocRef, siteContent);
          document.getElementById('saveIndicator').classList.add('show');
          setTimeout(() => document.getElementById('saveIndicator').classList.remove('show'), 2000);
        } catch (e) {
          console.error("Firebase save error", e);
        }
      }, 800);
    }

    // Ανανέωση ολόκληρης της προβολής (tabs + σελίδες)
    function renderAll() {
      // Κεντρικά πεδία (εξώφυλλο, footer)
      document.getElementById('cover-badge-pre').textContent = siteContent.cover.badge;
      document.getElementById('cover-span-pre').textContent = siteContent.cover.span;
      document.getElementById('cover-subhead-pre').textContent = siteContent.cover.subhead;
      document.getElementById('cover-rank-pre').innerHTML = '<i class="fas fa-star"></i> ' + siteContent.cover.rank;
      document.getElementById('cover-sticker-pre').innerHTML = '<i class="fas fa-certificate"></i> ' + siteContent.cover.sticker;
      document.getElementById('cover-quote-pre').innerHTML = '<i class="fas fa-quote-right" style="color:#c9a03d;"></i> ' + siteContent.cover.quote;
      document.getElementById('footer-left-pre').textContent = siteContent.footer.left;
      document.getElementById('footer-right-pre').textContent = siteContent.footer.right;

      // Δυναμικά tabs
      navTabs.innerHTML = '';
      contentArea.innerHTML = '';

      siteContent.categories.forEach((cat, index) => {
        // Δημιουργία tab
        const tab = document.createElement('div');
        tab.className = `nav-tab ${index === 0 ? 'active' : ''}`;
        tab.dataset.page = `page-${cat.id}`;
        tab.innerHTML = `<i class="fas fa-file-alt"></i> ${cat.title}`;
        navTabs.appendChild(tab);

        // Δημιουργία σελίδας
        const page = document.createElement('div');
        page.id = `page-${cat.id}`;
        page.className = `page ${index === 0 ? 'active-page' : ''}`;
        page.innerHTML = `<h2>${cat.title}</h2><div class="protocol-card">${cat.content}</div>`;
        contentArea.appendChild(page);
      });

      // Προσθήκη σελίδας για φωτογραφίες (σταθερή)
      const photoTab = document.createElement('div');
      photoTab.className = 'nav-tab';
      photoTab.dataset.page = 'page-photos';
      photoTab.innerHTML = '<i class="fas fa-images"></i> ΦΩΤΟΓΡΑΦΙΕΣ';
      navTabs.appendChild(photoTab);

      const photoPage = document.createElement('div');
      photoPage.id = 'page-photos';
      photoPage.className = 'page';

      // Μόνο οι admin βλέπουν τη φόρμα προσθήκης
      let uploadHtml = '';
      if (isAdmin) {
        uploadHtml = `
          <div class="photo-upload-tool">
            <i class="fas fa-link"></i>
            <input id="imageUrlInput" placeholder="URL εικόνας">
            <button id="addImageBtn"><i class="fas fa-plus-circle"></i> Προσθήκη</button>
          </div>
        `;
      }

      photoPage.innerHTML = `
        <h2><i class="fas fa-camera-retro"></i> Φωτογραφίες υπηρεσίας</h2>
        ${uploadHtml}
        <div id="gallery-area">
          <!-- Προαιρετικές αρχικές φωτογραφίες -->
          <img src="https://images.unsplash.com/photo-1585670149965-2c2b5a8e8b9c?w=200&h=150&fit=crop" class="gallery-img" alt="περίπολο">
          <img src="https://images.unsplash.com/photo-1542756470-3d7f2b2f3e9d?w=200&h=150&fit=crop" class="gallery-img" alt="αστυνομικό τμήμα">
          <img src="https://images.pexels.com/photos/712916/pexels-photo-712916.jpeg?auto=compress&cs=tinysrgb&w=200&h=150&fit=crop" class="gallery-img" alt="σήμα">
        </div>
      `;
      contentArea.appendChild(photoPage);

      // Επαναφορά λειτουργίας tabs
      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', function(e) {
          document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
          this.classList.add('active');
          const targetId = this.dataset.page;
          document.getElementById(targetId).classList.add('active-page');
        });
      });

      // Αρχικά ενεργό το πρώτο tab ή αν δεν υπάρχουν κατηγορίες, τα φωτογραφιών
      if (siteContent.categories.length > 0) {
        document.getElementById(`page-${siteContent.categories[0].id}`).classList.add('active-page');
      } else {
        document.getElementById('page-photos').classList.add('active-page');
        const photoNavTab = Array.from(document.querySelectorAll('.nav-tab')).find(t => t.dataset.page === 'page-photos');
        if (photoNavTab) photoNavTab.classList.add('active');
      }

      // Ξανασυνδέουμε το κουμπί προσθήκης φωτογραφιών μόνο αν είμαστε admin
      if (isAdmin) {
        const addBtn = document.getElementById('addImageBtn');
        const urlInput = document.getElementById('imageUrlInput');
        const gallery = document.getElementById('gallery-area');
        if (addBtn) {
          addBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (url) {
              const img = document.createElement('img');
              img.src = url;
              img.className = 'gallery-img';
              img.onerror = () => { alert('Μη έγκυρο URL'); img.remove(); };
              gallery.appendChild(img);
              urlInput.value = '';
            }
          });
        }
      }
    }

    // Κατασκευή πάνελ επεξεργασίας
    function buildPanel() {
      const panelDiv = document.getElementById('panelContent');
      panelDiv.innerHTML = '';

      // Ενότητα Εξώφυλλο
      panelDiv.appendChild(sectionTitle('Εξώφυλλο'));
      panelDiv.appendChild(field('cover.badge', 'Κεντρικό κείμενο', siteContent.cover.badge));
      panelDiv.appendChild(field('cover.span', 'Span FIVEM RP', siteContent.cover.span));
      panelDiv.appendChild(field('cover.subhead', 'Υπότιτλος', siteContent.cover.subhead));
      panelDiv.appendChild(field('cover.rank', 'Rank tag', siteContent.cover.rank));
      panelDiv.appendChild(field('cover.sticker', 'Sticker', siteContent.cover.sticker));
      panelDiv.appendChild(field('cover.quote', 'Απόφθεγμα', siteContent.cover.quote));

      // Ενότητα Κατηγορίες
      panelDiv.appendChild(sectionTitle('Κατηγορίες'));
      const addCatBtn = document.createElement('button');
      addCatBtn.className = 'add-category-btn';
      addCatBtn.innerHTML = '<i class="fas fa-plus"></i> Προσθήκη νέας κατηγορίας';
      addCatBtn.addEventListener('click', () => {
        const newId = 'cat' + Date.now() + Math.random().toString(36).substr(2, 4);
        siteContent.categories.push({
          id: newId,
          title: 'Νέα κατηγορία',
          content: '<p>Περιεχόμενο...</p>'
        });
        renderAll();
        saveToFirebase();
        buildPanel(); // ανανέωση panel
      });
      panelDiv.appendChild(addCatBtn);

      siteContent.categories.forEach((cat) => {
        const catDiv = document.createElement('div');
        catDiv.className = 'category-item';
        
        const header = document.createElement('div');
        header.className = 'category-header';
        const titleInput = document.createElement('input');
        titleInput.value = cat.title;
        titleInput.placeholder = 'Τίτλος κατηγορίας';
        titleInput.addEventListener('input', (e) => {
          cat.title = e.target.value;
          renderAll();
          saveToFirebase();
        });
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-cat-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
        deleteBtn.addEventListener('click', () => {
          siteContent.categories = siteContent.categories.filter(c => c.id !== cat.id);
          renderAll();
          saveToFirebase();
          buildPanel();
        });
        header.appendChild(titleInput);
        header.appendChild(deleteBtn);
        catDiv.appendChild(header);

        const contentLabel = document.createElement('label');
        contentLabel.textContent = 'Περιεχόμενο (HTML)';
        catDiv.appendChild(contentLabel);
        const contentTextarea = document.createElement('textarea');
        contentTextarea.value = cat.content;
        contentTextarea.style.minHeight = '150px';
        contentTextarea.addEventListener('input', (e) => {
          cat.content = e.target.value;
          renderAll();
          saveToFirebase();
        });
        catDiv.appendChild(contentTextarea);
        panelDiv.appendChild(catDiv);
      });

      // Ενότητα Υποσέλιδο
      panelDiv.appendChild(sectionTitle('Υποσέλιδο'));
      panelDiv.appendChild(field('footer.left', 'Αριστερό κείμενο', siteContent.footer.left));
      panelDiv.appendChild(field('footer.right', 'Δεξί κείμενο', siteContent.footer.right));
    }

    // Βοηθητικές συναρτήσεις για πεδία
    function sectionTitle(text) {
      const div = document.createElement('div');
      div.className = 'edit-section';
      div.innerHTML = `<h4>${text}</h4>`;
      return div;
    }

    function field(path, label, value) {
      const div = document.createElement('div');
      div.className = 'edit-field';
      const lab = document.createElement('label');
      lab.textContent = label;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = value;
      input.dataset.path = path;
      input.addEventListener('input', (e) => {
        const parts = e.target.dataset.path.split('.');
        let obj = siteContent;
        for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
        obj[parts[parts.length - 1]] = e.target.value;
        renderAll();
        saveToFirebase();
      });
      div.appendChild(lab);
      div.appendChild(input);
      return div;
    }

    // Authentication
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        authStatus.innerHTML = `<i class="fas fa-user-shield"></i> ${user.email}`;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-flex';
        isAdmin = await checkIfAdmin(user.uid);
        if (isAdmin) {
          toggleEditBtn.classList.add('visible');
        } else {
          toggleEditBtn.classList.remove('visible');
          authStatus.innerHTML += ' (απλός χρήστης)';
        }
        // Ανανέωση της σελίδας για να εμφανιστεί/κρυφτεί η φόρμα φωτογραφιών
        renderAll();
      } else {
        authStatus.innerHTML = 'Μη συνδεδεμένος';
        loginBtn.style.display = 'inline-flex';
        logoutBtn.style.display = 'none';
        toggleEditBtn.classList.remove('visible');
        isAdmin = false;
        panel.classList.remove('open');
        mainView.classList.remove('shifted');
        renderAll(); // ξανατρέχουμε για να κρύψουμε τη φόρμα
      }
    });

    loginBtn.addEventListener('click', () => loginModal.classList.add('show'));
    submitLogin.addEventListener('click', async () => {
      try {
        await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
        loginModal.classList.remove('show');
        loginError.textContent = '';
      } catch (error) {
        loginError.textContent = 'Λάθος email ή κωδικός';
      }
    });
    logoutBtn.addEventListener('click', async () => await signOut(auth));
    loginModal.addEventListener('click', (e) => { if (e.target === loginModal) loginModal.classList.remove('show'); });

    toggleEditBtn.addEventListener('click', () => {
      if (!isAdmin) return;
      panel.classList.toggle('open');
      mainView.classList.toggle('shifted');
      if (panel.classList.contains('open')) buildPanel();
    });
    closePanelBtn.addEventListener('click', () => {
      panel.classList.remove('open');
      mainView.classList.remove('shifted');
    });

    // Αρχική φόρτωση
    await loadContent();
  </script>
</body>
</html>
