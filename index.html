<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ΕΛ.ΑΣ. | Σύγχρονη Διαχείριση</title>
  <!-- Font Awesome 6 (δωρεάν) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* Modern reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
      color: #1e293b;
      line-height: 1.5;
      min-height: 100vh;
      padding: 24px;
    }

    /* main app container */
    .app {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 24px;
    }

    /* main content (site preview) */
    .main-content {
      flex: 1;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      overflow: hidden;
      transition: all 0.3s;
    }

    /* header */
    .site-header {
      background: linear-gradient(135deg, #0b2b44 0%, #123b5e 100%);
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid #fbbf24;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo i {
      font-size: 2.5rem;
      color: #fcd34d;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    .logo-text h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.02em;
    }

    .logo-text h1 span {
      color: #fbbf24;
      font-weight: 300;
      margin-left: 6px;
    }

    .logo-text .subhead {
      color: #b8d4f0;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .rank-tag {
      background: rgba(255,215,120,0.15);
      backdrop-filter: blur(4px);
      padding: 8px 22px;
      border-radius: 60px;
      border: 1px solid #fbbf24;
      font-weight: 600;
      color: #fef3c7;
      font-size: 1rem;
      box-shadow: inset 0 0 12px rgba(250,204,21,0.2);
    }

    .rank-tag i {
      margin-right: 8px;
      color: #fbbf24;
    }

    /* navigation tabs */
    .nav-tabs {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      padding: 0.75rem 2.5rem 0;
      border-bottom: 1px solid rgba(203,213,225,0.5);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .nav-tab {
      padding: 0.8rem 1.8rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: #334155;
      border-radius: 30px 30px 0 0;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      border-bottom: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .nav-tab i {
      color: #5f7d9c;
    }

    .nav-tab:hover {
      background: rgba(255,255,255,0.9);
      color: #0b2b44;
    }

    .nav-tab.active {
      background: white;
      border-color: #cbd5e1;
      border-bottom: 2px solid white;
      margin-bottom: -1px;
      color: #1e3a8a;
      font-weight: 700;
      box-shadow: 0 -4px 8px rgba(0,0,0,0.02);
    }

    .nav-tab.active i {
      color: #fbbf24;
    }

    /* content area */
    .content-area {
      padding: 2.5rem;
      background: white;
    }

    .page {
      display: none;
      animation: fade 0.25s ease;
    }

    .page.active-page {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0.3; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #0c2b4a;
      border-left: 8px solid #fbbf24;
      padding-left: 1.5rem;
      margin-bottom: 2rem;
      line-height: 1.2;
    }

    .protocol-card {
      background: #f8fafc;
      border-radius: 28px;
      padding: 2rem;
      border: 1px solid #e2e8f0;
      box-shadow: 0 8px 20px -8px rgba(0,20,40,0.1);
    }

    /* footer */
    .site-footer {
      background: #0f1f30;
      color: #b0c9e0;
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      border-top: 2px solid #fbbf24;
    }

    /* ========== ADMIN PANEL (πλαϊνή μπάρα) ========== */
    .admin-panel {
      width: 400px;
      background: rgba(18, 28, 40, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      color: #f0f4fa;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: fit-content;
      transition: all 0.3s;
    }

    .admin-header {
      padding: 24px 24px 16px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid #334e68;
    }

    .admin-header h3 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #fbbf24;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-header p {
      color: #9ab3d1;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .admin-content {
      padding: 20px;
      overflow-y: auto;
      max-height: 70vh;
      scrollbar-width: thin;
      scrollbar-color: #fbbf24 #1e2f40;
    }

    .admin-content::-webkit-scrollbar {
      width: 8px;
    }
    .admin-content::-webkit-scrollbar-track {
      background: #1e2f40;
      border-radius: 10px;
    }
    .admin-content::-webkit-scrollbar-thumb {
      background: #fbbf24;
      border-radius: 10px;
    }

    .admin-section {
      margin-bottom: 32px;
      border-bottom: 1px dashed #3e5a73;
      padding-bottom: 24px;
    }

    .admin-section h4 {
      color: #fcd34d;
      font-size: 1.2rem;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-field {
      margin-bottom: 18px;
    }

    .admin-field label {
      display: block;
      font-size: 0.85rem;
      color: #b3cef0;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .admin-field input,
    .admin-field textarea {
      width: 100%;
      padding: 12px 16px;
      background: #263b50;
      border: 1px solid #4f6887;
      border-radius: 24px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .admin-field input:focus,
    .admin-field textarea:focus {
      outline: none;
      border-color: #fbbf24;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.2);
    }

    .admin-field textarea {
      min-height: 100px;
      resize: vertical;
    }

    /* category items */
    .category-item-admin {
      background: #1e3349;
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 20px;
      border: 1px solid #4a6a8a;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    .category-header-admin {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .category-header-admin input {
      flex: 1;
      background: #0f1f30;
      border: 1px solid #5b7da0;
      color: white;
      padding: 10px 16px;
      border-radius: 30px;
    }

    .delete-cat-btn {
      background: #a13d3d;
      border: none;
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 42px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .delete-cat-btn:hover {
      background: #c03939;
      transform: scale(1.05);
    }

    .add-category-btn {
      background: #2a5f2a;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 40px;
      width: 100%;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px 0 10px;
      transition: 0.2s;
    }

    .add-category-btn:hover {
      background: #1f7a1f;
      transform: scale(1.02);
    }

    /* photos gallery inside admin */
    .photos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
    }

    .photo-item {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      border: 2px solid #fbbf24;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .delete-photo-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #b91c1c;
      color: white;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 28px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
      transition: 0.2s;
    }

    .delete-photo-btn:hover {
      background: #dc2626;
      transform: scale(1.1);
    }

    .photo-upload-tool-admin {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .photo-upload-tool-admin input {
      flex: 1;
      background: #263b50;
      border: 1px solid #4f6887;
      border-radius: 40px;
      padding: 12px 18px;
      color: white;
    }

    .photo-upload-tool-admin button {
      background: #1d3e63;
      color: white;
      border: none;
      padding: 0 24px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #fbbf24;
      transition: 0.2s;
    }

    .photo-upload-tool-admin button:hover {
      background: #2c527c;
    }

    /* auth bar */
    .auth-bar {
      background: #eef2f6;
      padding: 12px 25px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      border-bottom: 1px solid #cbd6e4;
    }

    .auth-status {
      font-size: 0.95rem;
      color: #1e3b5c;
      background: white;
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid #b0c4db;
    }

    .auth-btn {
      background: #1d3e63;
      border: none;
      color: white;
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #fbbf24;
      font-size: 0.95rem;
      transition: 0.2s;
    }

    .auth-btn.logout {
      background: #5e4c38;
      border-color: #a69b87;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    /* modal login */
    .login-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }

    .login-modal.show {
      visibility: visible;
      opacity: 1;
    }

    .login-card {
      background: white;
      max-width: 400px;
      width: 90%;
      padding: 40px;
      border-radius: 60px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      text-align: center;
    }

    .login-card h3 {
      margin-bottom: 24px;
      color: #0b1a30;
      font-size: 1.8rem;
    }

    .login-card input {
      width: 100%;
      padding: 16px 20px;
      margin-bottom: 16px;
      border: 2px solid #dde3ec;
      border-radius: 60px;
      font-size: 1rem;
    }

    .login-card button {
      background: #1d3e63;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 60px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .login-card .error {
      color: #b02e2e;
      margin-top: 16px;
    }

    /* responsive */
    @media (max-width: 1000px) {
      .app {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

      <div class="admin-content" id="adminContent">

      </div>

  </div>

      <button id="submitLogin">Σύνδεση</button>

    const defaultContent = {
      cover: {
        badge: "ΕΛΛΗΝΙΚΗ ΑΣΤΥΝΟΜΙΑ",
        span: "FIVEM RP",
        subhead: "ΠΡΩΤΟΚΟΛΛΟ · ΚΑΝΟΝΙΣΜΟΣ · ΔΕΟΝΤΟΛΟΓΙΑ",
        rank: "ΤΑΞΙΑΡΧΟΣ Δ. ΓΕΩΡΓΑΝΤΖΕΛΗΣ",
        sticker: "ΕΓΧΕΙΡΙΔΙΟ ΕΛ.ΑΣ. FIVEM RP  —  ΕΚΔΟΣΗ 2025",
        quote: "Κράτος δικαίου, ασφάλεια, σεβασμός"
      },
      categories: [
        {
          id: "cat1",
          title: "ΕΙΣΑΓΩΓΗ",
          content: `Η Ελληνική Αστυνομία, στο πλαίσιο του δημοκρατικού πολιτεύματος αποτελεί μία από τις βασικές συνιστώσες του κράτους δικαίου.\n\nΟι Αστυνομικοί είναι οι θεματοφύλακες των πολυτιμότερων αγαθών και δικαιωμάτων του Πολίτη. Στη σύγχρονη κοινωνική πραγματικότητα, ο ρόλος του Αστυνομικού καθίσταται πλέον πολυδιάστατος, πολύμορφος και καθοριστικός.\n\nΟ Αστυνομικός καλείται σήμερα να λειτουργήσει όχι ως απρόσωπος εκφραστής ενός μηχανισμού, αλλά μέσα από συλλογικές διαδικασίες που στηρίζονται στη συνεργασία Αστυνομίας και κοινωνίας, με απόλυτο πάντα σεβασμό στα ανθρώπινα δικαιώματα και τις ατομικές ελευθερίες.\n\nΤη σχέση αυτή ενδυναμώνει η έκδοση του παρόντος Κώδικα Δεοντολογίας. Είναι ένα πλαίσιο αρχών και κανόνων, που επισφραγίζει την αμοιβαία αναγνώριση και εμπιστοσύνη μεταξύ Αστυνομικών και Πολιτών.`
        },
        {
          id: "cat2",
          title: "ΚΩΔΙΚΑΣ ΔΕΟΝΤΟΛΟΓΙΑΣ",
          content: `- Υπακούει και προασπίζει τους νόμους.\n- Διατηρεί ψυχραιμία σε καταστάσεις που ξεφεύγουν από τον έλεγχο.\n- Σέβεται τους πολίτες, απευθύνεται στον πληθυντικό, προστατεύει έστω και με κίνδυνο της ασφάλειάς του.\n- Σέβεται την ιεραρχία και εκτελεί εντολές ανωτέρων.\n- Χρησιμοποιεί τον εξοπλισμό (ρουχισμό, όχημα, οπλισμό) μόνον εν ώρα υπηρεσίας.`
        },
        {
          id: "cat3",
          title: "ΣΗΜΑΤΑ & ΛΗΣΤΕΙΕΣ",
          content: `**Κανόνες σημάτων**\nΤο σήμα [XX-XX] δίνεται υποχρεωτικά μόνο αν έχουν ληφθεί τα στοιχεία του πολίτη. Ο πολίτης μπορεί να ζητήσει σήμα μόνο αν συντρέχει λόγος· διαφορετικά οφείλει να απευθυνθεί στο τμήμα. Απαγορεύεται να αναφέρεται ονοματεπώνυμο συναδέλφου για αυτοπροστασία.\n\n**Ληστείες – Ομηρίες**\n- Άφιξη εντός 5 λεπτών\n- 2 αστυνομικοί παραπάνω από ληστές\n- Άοπλος διαπραγματευτής\n- Αιτήματα: δευτερόλεπτα, καρφιά, γεράκι, οχήματα. Μετά από 20' δικαίωμα επέμβασης.`
        },
        {
          id: "cat4",
          title: "ΔΙΚΑΙΩΜΑΤΑ ΠΟΛΙΤΗ",
          content: `📋 Υπό κράτηση/σύλληψη\n- Διάβασμα δικαιωμάτων: «Βρίσκεστε υπό κράτηση για... Έχετε δικαίωμα σιωπής (εκτός ταυτότητας). Ό,τι πείτε θα χρησιμοποιηθεί εναντίον σας. Δικαίωμα σε ένα τηλεφώνημα και νομική κάλυψη.»\n- Δεν αφαιρείται ποτέ φαγητό/νερό. Αν έχει άδεια οπλοκατοχής, αφαιρείται προσωρινά ο οπλισμός.\n- Ταυτοποίηση μέσω MDT, αναγραφή κατηγοριών, συνολική ποινή και χρηματικό ποσό.\n- Παροχή δικηγόρου αν δεν έχει οικονομική άνεση.`
        },
        {
          id: "cat5",
          title: "TRAFFIC STOP",
          content: `Τι είναι: Έλεγχος οχήματος για τροχαία παράβαση ή πιθανή εμπλοκή σε έγκλημα.\n\nΔιαδικασία:\n1. Ενημέρωση ασυρμάτου.\n2. Κλείδωμα πινακίδας με radar.\n3. Οδηγός σβήνει μηχανή, κατεβάζει παράθυρα (αν φιμέ, όλα τα τζάμια).\n4. Κατέβασμα οδηγού, μετακίνηση στο πεζοδρόμιο.\n5. Ζητάμε στοιχεία, έγγραφα, λόγο ελέγχου.\n6. Έλεγχος MDT, πινακίδων, ποινικού μητρώου.\n7. Αναφορά ασυρμάτου «traffic stop υπό έλεγχο».`
        }
      ],
      photos: [], // ΚΑΜΙΑ προεπιλεγμένη φωτογραφία
      footer: {
        left: "ΕΛ.ΑΣ. FiveM RP – Πρωτόκολλο Ελληνικής Αστυνομίας",
        right: "Έκδοση 1.0 | Ταξίαρχος Δ. Γεωργαντζέλης"
      }
    };

    // State
    let siteContent = JSON.parse(JSON.stringify(defaultContent));
    let currentUser = null;
    let isAdmin = false;

    // DOM elements
    const authStatus = document.getElementById('authStatus');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginModal = document.getElementById('loginModal');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const submitLogin = document.getElementById('submitLogin');
    const loginError = document.getElementById('loginError');
    const adminPanel = document.getElementById('adminPanel');
    const adminContent = document.getElementById('adminContent');
    const navTabs = document.getElementById('navTabs');
    const contentArea = document.getElementById('contentArea');

    // Βοηθητικές συναρτήσεις
    function safeSetText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }
    function safeSetHTML(id, value) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = value;
    }

    // Μετατροπή plain text σε HTML (ίδια λογική)
    function textToHTML(text) {
      if (!text) return '';
      const lines = text.split('\n');
      let inList = false;
      let html = '';
      for (let line of lines) {
        line = line.trim();
        if (line === '') {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          continue;
        }
        if (line.startsWith('- ') || line.startsWith('* ')) {
          if (!inList) {
            html += '<ul>';
            inList = true;
          }
          html += `<li>${line.substring(2)}</li>`;
        } else {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          const numberedMatch = line.match(/^(\d+)\.\s+(.*)/);
          if (numberedMatch) {
            html += `<ol><li>${numberedMatch[2]}</li></ol>`;
          } else {
            html += `<p>${line}</p>`;
          }
        }
      }
      if (inList) html += '</ul>';
      return html;
    }

    // Φόρτωση από Firebase
    async function loadContent() {
      try {
        const snap = await getDoc(contentDocRef);
        if (snap.exists()) {
          const data = snap.data();
          siteContent = {
            cover: { ...defaultContent.cover, ...(data.cover || {}) },
            categories: Array.isArray(data.categories) ? data.categories : defaultContent.categories,
            photos: Array.isArray(data.photos) ? data.photos : defaultContent.photos,
            footer: { ...defaultContent.footer, ...(data.footer || {}) }
          };
        } else {
          await setDoc(contentDocRef, defaultContent);
        }
      } catch (e) {
        console.error("Firebase load error, using default", e);
      }
      renderMain();
      if (isAdmin) renderAdminPanel();
    }

    // Αποθήκευση (μόνο admin)
    let saveTimeout;
    function saveToFirebase() {
      if (!isAdmin) return;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        try {
          await setDoc(contentDocRef, siteContent);
          // μικρή ένδειξη (μπορούμε να προσθέσουμε ένα toast αργότερα)
        } catch (e) {
          console.error("Firebase save error", e);
        }
      }, 800);
    }

    // Έλεγχος admin
    async function checkIfAdmin(uid) {
      try {
        const adminDoc = await getDoc(doc(db, "admins", uid));
        return adminDoc.exists();
      } catch (e) {
        return false;
      }
    }

    // Ανανέωση της κύριας προβολής
    function renderMain() {
      // Στατικά πεδία
      safeSetText('cover-badge-pre', siteContent.cover.badge);
      safeSetText('cover-span-pre', siteContent.cover.span);
      safeSetText('cover-subhead-pre', siteContent.cover.subhead);
      const rankEl = document.getElementById('cover-rank-pre');
      if (rankEl) rankEl.innerHTML = '<i class="fas fa-star"></i> ' + siteContent.cover.rank;
      const stickerEl = document.getElementById('cover-sticker-pre');
      if (stickerEl) stickerEl.innerHTML = '<i class="fas fa-certificate"></i> ' + siteContent.cover.sticker;
      const quoteEl = document.getElementById('cover-quote-pre');
      if (quoteEl) quoteEl.innerHTML = '<i class="fas fa-quote-right" style="color:#fbbf24;"></i> ' + siteContent.cover.quote;
      safeSetText('footer-left-pre', siteContent.footer.left);
      safeSetText('footer-right-pre', siteContent.footer.right);

      if (!navTabs || !contentArea) return;

      navTabs.innerHTML = '';
      contentArea.innerHTML = '';

      const categories = siteContent.categories || [];
      categories.forEach((cat, index) => {
        if (!cat || !cat.id) return;
        const tab = document.createElement('div');
        tab.className = `nav-tab ${index === 0 ? 'active' : ''}`;
        tab.dataset.page = `page-${cat.id}`;
        tab.innerHTML = `<i class="fas fa-file-alt"></i> ${cat.title}`;
        navTabs.appendChild(tab);

        const page = document.createElement('div');
        page.id = `page-${cat.id}`;
        page.className = `page ${index === 0 ? 'active-page' : ''}`;
        const htmlContent = textToHTML(cat.content || '');
        page.innerHTML = `<h2>${cat.title}</h2><div class="protocol-card">${htmlContent}</div>`;
        contentArea.appendChild(page);
      });

      // Σελίδα φωτογραφιών
      const photoTab = document.createElement('div');
      photoTab.className = 'nav-tab';
      photoTab.dataset.page = 'page-photos';
      photoTab.innerHTML = '<i class="fas fa-images"></i> ΦΩΤΟΓΡΑΦΙΕΣ';
      navTabs.appendChild(photoTab);

      const photoPage = document.createElement('div');
      photoPage.id = 'page-photos';
      photoPage.className = 'page';
      const photos = siteContent.photos || [];
      const galleryHtml = photos.map(url => `<img src="${url}" class="gallery-img" style="max-height:160px; max-width:220px; border-radius:20px; box-shadow:0 8px 18px rgba(0,0,0,0.2); border:3px solid white; object-fit:cover;">`).join('');
      photoPage.innerHTML = `
        <h2><i class="fas fa-camera-retro"></i> Φωτογραφίες υπηρεσίας</h2>
        <div id="gallery-area" style="display:flex; flex-wrap:wrap; gap:25px; margin-top:25px;">${galleryHtml}</div>
      `;
      contentArea.appendChild(photoPage);

      // Ενεργοποίηση tabs
      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', function(e) {
          document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
          this.classList.add('active');
          const targetId = this.dataset.page;
          const targetPage = document.getElementById(targetId);
          if (targetPage) targetPage.classList.add('active-page');
        });
      });

      if (categories.length === 0) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        const photoTabElem = Array.from(document.querySelectorAll('.nav-tab')).find(t => t.dataset.page === 'page-photos');
        if (photoTabElem) {
          photoTabElem.classList.add('active');
          document.getElementById('page-photos').classList.add('active-page');
        }
      }
    }

    // Ανανέωση του πίνακα admin
    function renderAdminPanel() {
      if (!adminContent) return;
      adminContent.innerHTML = '';

      // Ενότητα Εξώφυλλο
      adminContent.appendChild(sectionTitle('Εξώφυλλο'));
      adminContent.appendChild(field('cover.badge', 'Κεντρικό κείμενο', siteContent.cover.badge));
      adminContent.appendChild(field('cover.span', 'Span FIVEM RP', siteContent.cover.span));
      adminContent.appendChild(field('cover.subhead', 'Υπότιτλος', siteContent.cover.subhead));
      adminContent.appendChild(field('cover.rank', 'Rank tag', siteContent.cover.rank));
      adminContent.appendChild(field('cover.sticker', 'Sticker', siteContent.cover.sticker));
      adminContent.appendChild(field('cover.quote', 'Απόφθεγμα', siteContent.cover.quote));

      // Ενότητα Κατηγορίες
      adminContent.appendChild(sectionTitle('Κατηγορίες'));
      const addCatBtn = document.createElement('button');
      addCatBtn.className = 'add-category-btn';
      addCatBtn.innerHTML = '<i class="fas fa-plus-circle"></i> Προσθήκη κατηγορίας';
      addCatBtn.addEventListener('click', () => {
        const newId = 'cat' + Date.now() + Math.random().toString(36).substring(2, 6);
        if (!siteContent.categories) siteContent.categories = [];
        siteContent.categories.push({
          id: newId,
          title: 'Νέα κατηγορία',
          content: 'Περιεχόμενο...'
        });
        renderMain();
        saveToFirebase();
        renderAdminPanel();
      });
      adminContent.appendChild(addCatBtn);

      (siteContent.categories || []).forEach((cat) => {
        const catDiv = document.createElement('div');
        catDiv.className = 'category-item-admin';
        
        const header = document.createElement('div');
        header.className = 'category-header-admin';
        const titleInput = document.createElement('input');
        titleInput.value = cat.title || '';
        titleInput.placeholder = 'Τίτλος κατηγορίας';
        titleInput.addEventListener('input', (e) => {
          cat.title = e.target.value;
          renderMain();
          saveToFirebase();
        });
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-cat-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
        deleteBtn.addEventListener('click', () => {
          siteContent.categories = siteContent.categories.filter(c => c.id !== cat.id);
          renderMain();
          saveToFirebase();
          renderAdminPanel();
        });
        header.appendChild(titleInput);
        header.appendChild(deleteBtn);
        catDiv.appendChild(header);

        const contentLabel = document.createElement('label');
        contentLabel.textContent = 'Περιεχόμενο (απλό κείμενο)';
        catDiv.appendChild(contentLabel);
        const contentTextarea = document.createElement('textarea');
        contentTextarea.value = cat.content || '';
        contentTextarea.style.minHeight = '150px';
        contentTextarea.addEventListener('input', (e) => {
          cat.content = e.target.value;
          renderMain();
          saveToFirebase();
        });
        catDiv.appendChild(contentTextarea);
        adminContent.appendChild(catDiv);
      });

      // Ενότητα Φωτογραφίες
      adminContent.appendChild(sectionTitle('Φωτογραφίες'));
      const photoUploadDiv = document.createElement('div');
      photoUploadDiv.className = 'photo-upload-tool-admin';
      photoUploadDiv.innerHTML = `
        <input type="text" id="adminPhotoUrl" placeholder="URL εικόνας">
        <button id="adminAddPhotoBtn"><i class="fas fa-plus"></i> Προσθήκη</button>
      `;
      adminContent.appendChild(photoUploadDiv);

      const photosGrid = document.createElement('div');
      photosGrid.className = 'photos-grid';
      (siteContent.photos || []).forEach((url, index) => {
        const photoItem = document.createElement('div');
        photoItem.className = 'photo-item';
        photoItem.innerHTML = `
          <img src="${url}" alt="φωτογραφία">
          <button class="delete-photo-btn" data-index="${index}"><i class="fas fa-times"></i></button>
        `;
        photosGrid.appendChild(photoItem);
      });
      adminContent.appendChild(photosGrid);

      // Ενότητα Υποσέλιδο
      adminContent.appendChild(sectionTitle('Υποσέλιδο'));
      adminContent.appendChild(field('footer.left', 'Αριστερό κείμενο', siteContent.footer.left));
      adminContent.appendChild(field('footer.right', 'Δεξί κείμενο', siteContent.footer.right));

      // Προσθήκη event listeners για φωτογραφίες
      const addPhotoBtn = document.getElementById('adminAddPhotoBtn');
      const photoUrlInput = document.getElementById('adminPhotoUrl');
      if (addPhotoBtn && photoUrlInput) {
        addPhotoBtn.addEventListener('click', () => {
          const url = photoUrlInput.value.trim();
          if (url) {
            if (!siteContent.photos) siteContent.photos = [];
            siteContent.photos.push(url);
            renderMain();
            saveToFirebase();
            renderAdminPanel();
          }
        });
      }

      document.querySelectorAll('.delete-photo-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const index = e.currentTarget.dataset.index;
          siteContent.photos.splice(index, 1);
          renderMain();
          saveToFirebase();
          renderAdminPanel();
        });
      });
    }

    function sectionTitle(text) {
      const div = document.createElement('div');
      div.className = 'admin-section';
      div.innerHTML = `<h4><i class="fas fa-pen"></i> ${text}</h4>`;
      return div;
    }

    function field(path, label, value) {
      const div = document.createElement('div');
      div.className = 'admin-field';
      const lab = document.createElement('label');
      lab.textContent = label;
      const input = document.createElement('input');
      input.type = 'text';
      input.value = value || '';
      input.dataset.path = path;
      input.addEventListener('input', (e) => {
        const parts = e.target.dataset.path.split('.');
        let obj = siteContent;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!obj[parts[i]]) obj[parts[i]] = {};
          obj = obj[parts[i]];
        }
        obj[parts[parts.length - 1]] = e.target.value;
        renderMain();
        saveToFirebase();
      });
      div.appendChild(lab);
      div.appendChild(input);
      return div;
    }

    // Authentication
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        authStatus.innerHTML = `<i class="fas fa-user-shield"></i> ${user.email}`;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-flex';
        isAdmin = await checkIfAdmin(user.uid);
        if (isAdmin) {
          adminPanel.style.display = 'flex';
          renderAdminPanel();
        } else {
          adminPanel.style.display = 'none';
          authStatus.innerHTML += ' (απλός χρήστης)';
        }
        renderMain();
      } else {
        authStatus.innerHTML = 'Μη συνδεδεμένος';
        loginBtn.style.display = 'inline-flex';
        logoutBtn.style.display = 'none';
        adminPanel.style.display = 'none';
        isAdmin = false;
        renderMain();
      }
    });

    loginBtn.addEventListener('click', () => loginModal.classList.add('show'));
    submitLogin.addEventListener('click', async () => {
      try {
        await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
        loginModal.classList.remove('show');
        loginError.textContent = '';
      } catch (error) {
        loginError.textContent = 'Λάθος email ή κωδικός';
      }
    });
    logoutBtn.addEventListener('click', async () => await signOut(auth));
    loginModal.addEventListener('click', (e) => { if (e.target === loginModal) loginModal.classList.remove('show'); });

    // Αρχική φόρτωση
    loadContent();
  </script>
</body>
</html>
