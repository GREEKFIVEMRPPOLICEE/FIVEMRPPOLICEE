<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ΕΛ.ΑΣ. | Σύστημα Διαχείρισης</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <style>
    /* ── RESET & VARIABLES ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy:       #071525;
      --navy-mid:   #0d2240;
      --navy-light: #123558;
      --gold:       #f5c518;
      --gold-dim:   #c9a000;
      --gold-pale:  #fef3c7;
      --sky:        #5b9bd5;
      --red-alert:  #c0392b;
      --surface:    #ffffff;
      --surface2:   #f4f7fb;
      --surface3:   #e8eef6;
      --border:     #d1dae8;
      --text:       #0d1f35;
      --text-muted: #5a7a9a;
      --text-light: #8faec8;
      --shadow-sm:  0 2px 8px rgba(7,21,37,.08);
      --shadow-md:  0 8px 24px rgba(7,21,37,.12);
      --shadow-lg:  0 20px 48px rgba(7,21,37,.18);
      --radius-sm:  12px;
      --radius-md:  20px;
      --radius-lg:  32px;
      --radius-xl:  48px;
      --transition: 0.22s cubic-bezier(.4,0,.2,1);
      --font-head:  'Rajdhani', sans-serif;
      --font-body:  'Noto Sans', sans-serif;
    }
    body.dark {
      --navy:       #02080f;
      --navy-mid:   #071525;
      --navy-light: #0d2240;
      --surface:    #0d1926;
      --surface2:   #0f2035;
      --surface3:   #162840;
      --border:     #1e3a55;
      --text:       #dce8f5;
      --text-muted: #6b91b5;
      --text-light: #3d607f;
    }

    /* ── LOADING SCREEN ── */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--navy);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.9s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-emblem {
      width: 100px; height: 100px;
      border: 4px solid rgba(245,197,24,.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: flex; align-items: center; justify-content: center;
    }
    .loading-emblem i { font-size: 2.5rem; color: var(--gold); position: absolute; animation: none; }
    .loading-text {
      margin-top: 28px;
      font-family: var(--font-head);
      font-size: 1.6rem; font-weight: 700;
      color: var(--gold); letter-spacing: 4px;
    }
    .loading-sub {
      margin-top: 8px;
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: #3d607f; letter-spacing: 2px; text-transform: uppercase;
    }
    .loading-bar {
      width: 200px; height: 2px;
      background: rgba(245,197,24,.15);
      border-radius: 99px; margin-top: 20px; overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; background: var(--gold);
      animation: loadbar 3.5s ease forwards;
    }
    @keyframes loadbar { from { width: 0 } to { width: 100% } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BODY & LAYOUT ── */
    body {
      font-family: var(--font-body);
      background: var(--surface2);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }
    body.dark { background: var(--navy); }

    .app-wrapper {
      max-width: 1480px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    /* ── MAIN CARD ── */
    .main-content {
      flex: 1; min-width: 0;
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: background var(--transition), border-color var(--transition);
    }
    body.dark .main-content {
      background: var(--surface2);
      border-color: var(--border);
    }

    /* ── AUTH BAR ── */
    .auth-bar {
      background: var(--surface2);
      padding: 10px 28px;
      display: flex; align-items: center;
      justify-content: flex-end; gap: 12px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    body.dark .auth-bar { background: var(--navy-mid); border-bottom-color: var(--border); }

    .auth-status {
      font-family: var(--font-body); font-size: 0.85rem;
      color: var(--text-muted); background: var(--surface);
      padding: 5px 16px; border-radius: 99px;
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 7px;
      transition: background var(--transition), border-color var(--transition);
    }
    body.dark .auth-status { background: var(--surface3); }
    .auth-status i { color: var(--gold); }

    .auth-btn {
      font-family: var(--font-head); font-size: 0.95rem; font-weight: 600;
      letter-spacing: 0.5px;
      padding: 7px 22px; border-radius: 99px; border: none;
      cursor: pointer; transition: all var(--transition);
      display: inline-flex; align-items: center; gap: 8px;
    }
    #loginBtn { background: var(--navy-light); color: var(--gold); border: 1px solid var(--gold-dim); }
    #loginBtn:hover { background: var(--navy); box-shadow: 0 0 0 3px rgba(245,197,24,.2); }
    #logoutBtn { background: #2a1a1a; color: #f87171; border: 1px solid #6b2222; }
    #logoutBtn:hover { background: #3a1c1c; }
    #darkModeToggle {
      background: var(--surface3); border: 1px solid var(--border);
      color: var(--text-muted); width: 36px; height: 36px;
      border-radius: 50%; cursor: pointer; font-size: 0.9rem;
      transition: all var(--transition); display: flex; align-items: center; justify-content: center;
    }
    #darkModeToggle:hover { background: var(--navy-light); color: var(--gold); border-color: var(--gold-dim); }

    /* ── SITE HEADER ── */
    .site-header {
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
      padding: 1.8rem 2.8rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 3px solid var(--gold);
      position: relative; overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -55deg,
        transparent, transparent 40px,
        rgba(245,197,24,.02) 40px, rgba(245,197,24,.02) 80px
      );
      pointer-events: none;
    }
    .logo { display: flex; align-items: center; gap: 20px; position: relative; }
    .logo-icon-wrap {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, rgba(245,197,24,.2), rgba(245,197,24,.05));
      border-radius: 16px; border: 1.5px solid rgba(245,197,24,.4);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);
    }
    .logo-icon-wrap i { font-size: 2.2rem; color: var(--gold); }
    .logo-text h1 {
      font-family: var(--font-head);
      font-size: 2.2rem; font-weight: 700; color: #fff;
      letter-spacing: 1px; line-height: 1;
    }
    .logo-text h1 span { color: var(--gold); }
    .logo-text .subhead {
      font-family: var(--font-body);
      font-size: 0.78rem; color: #7aaedb; letter-spacing: 2.5px;
      text-transform: uppercase; margin-top: 5px;
    }
    .rank-tag {
      background: rgba(245,197,24,.1);
      border: 1px solid rgba(245,197,24,.35);
      padding: 10px 24px; border-radius: 99px;
      font-family: var(--font-head); font-weight: 600; font-size: 1.05rem;
      color: var(--gold-pale); letter-spacing: 0.5px;
      box-shadow: inset 0 0 20px rgba(245,197,24,.08);
      position: relative;
    }
    .rank-tag i { margin-right: 8px; }

    /* ── NAV TABS ── */
    .nav-tabs {
      background: var(--surface2);
      padding: 0.8rem 2.2rem 0;
      border-bottom: 2px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 4px;
      transition: background var(--transition);
    }
    body.dark .nav-tabs { background: var(--surface2); border-bottom-color: var(--border); }
    .nav-tab {
      font-family: var(--font-head); font-size: 1rem; font-weight: 600;
      letter-spacing: 0.3px;
      padding: 0.75rem 1.6rem;
      color: var(--text-muted);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      background: transparent;
      cursor: pointer; transition: all var(--transition);
      border: 1.5px solid transparent; border-bottom: none;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .nav-tab i { color: var(--text-light); transition: color var(--transition); }
    .nav-tab:hover { background: var(--surface3); color: var(--navy); }
    body.dark .nav-tab:hover { color: #c8dff4; }
    .nav-tab.active {
      background: var(--surface); border-color: var(--border);
      border-bottom: 2px solid var(--surface);
      margin-bottom: -2px; color: var(--navy-light);
      font-weight: 700;
      box-shadow: 0 -4px 12px rgba(0,0,0,.04);
    }
    body.dark .nav-tab.active {
      background: var(--surface2); border-color: var(--border);
      border-bottom-color: var(--surface2); color: var(--gold);
    }
    .nav-tab.active i { color: var(--gold); }

    /* ── CONTENT AREA ── */
    .content-area {
      padding: 2.5rem 2.8rem;
      background: var(--surface);
      min-height: 500px;
      transition: background var(--transition);
    }
    body.dark .content-area { background: var(--surface2); }

    .page { display: none; animation: fadeUp 0.25s ease; }
    .page.active-page { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTION HEADINGS ── */
    h2 {
      font-family: var(--font-head);
      font-size: 2.1rem; font-weight: 700; color: var(--navy-light);
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 2rem; padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }
    h2::before {
      content: '';
      display: block; width: 6px; height: 36px;
      background: linear-gradient(to bottom, var(--gold), var(--gold-dim));
      border-radius: 99px; flex-shrink: 0;
    }
    body.dark h2 { color: var(--gold); border-bottom-color: var(--border); }

    /* ── SUBCATEGORY TABS ── */
    .subcategory-tabs {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin: 1.5rem 0 0; padding-bottom: 0;
      border-bottom: 2px solid var(--border);
    }
    .subcategory-tab {
      font-family: var(--font-head); font-size: 0.95rem; font-weight: 600;
      padding: 0.6rem 1.4rem;
      color: var(--text-muted); background: var(--surface2);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      cursor: pointer; transition: all var(--transition);
      border: 1.5px solid transparent; border-bottom: none;
      display: inline-flex; align-items: center; gap: 7px;
    }
    body.dark .subcategory-tab { background: var(--surface3); color: var(--text-muted); }
    .subcategory-tab:hover { color: var(--navy); background: var(--surface3); }
    body.dark .subcategory-tab:hover { color: #c8dff4; }
    .subcategory-tab.active {
      background: var(--surface); border-color: var(--border);
      border-bottom: 2px solid var(--surface); margin-bottom: -2px;
      color: var(--navy-light); font-weight: 700;
    }
    body.dark .subcategory-tab.active {
      background: var(--surface2); border-color: var(--border);
      border-bottom-color: var(--surface2); color: var(--gold);
    }
    .subcategory-page { display: none; padding: 1.5rem 0 0; }
    .subcategory-page.active-page { display: block; }

    /* ── OFFICER CARDS ── */
    .officers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px; margin-top: 12px;
    }
    .officer-display-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 1.4rem;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 18px;
      transition: all var(--transition);
      position: relative; overflow: hidden;
    }
    .officer-display-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold), transparent);
      opacity: 0; transition: opacity var(--transition);
    }
    .officer-display-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: rgba(245,197,24,.4);
    }
    .officer-display-card:hover::after { opacity: 1; }
    body.dark .officer-display-card {
      background: var(--surface3);
      border-color: var(--border);
    }
    .officer-avatar {
      width: 88px; height: 88px; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--gold);
      background: var(--surface2); flex-shrink: 0;
      cursor: pointer; transition: transform var(--transition);
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
    }
    .officer-avatar:hover { transform: scale(1.05); }
    .officer-info .name {
      font-family: var(--font-head); font-size: 1.45rem;
      font-weight: 700; color: var(--navy-light); margin-bottom: 4px;
    }
    body.dark .officer-info .name { color: var(--gold); }
    .officer-info .rank {
      font-family: var(--font-head); font-size: 1rem; font-weight: 600;
      color: var(--sky); margin-bottom: 8px;
    }
    .officer-info .discord {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2); padding: 4px 12px;
      border-radius: 99px; font-size: 0.8rem; color: var(--text-muted);
      border: 1px solid var(--border);
    }
    body.dark .officer-info .discord { background: var(--surface); }
    .officer-info .discord i { color: #5865f2; }

    /* ── PROTOCOL CARD ── */
    .protocol-card {
      background: var(--surface2);
      border-radius: var(--radius-md);
      padding: 2rem 2.2rem;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: background var(--transition), border-color var(--transition);
    }
    body.dark .protocol-card { background: var(--surface3); border-color: var(--border); }

    /* ── PENALTIES TABLE ── */
    .penalties-table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      border-radius: var(--radius-md); overflow: hidden;
      box-shadow: var(--shadow-sm); border: 1.5px solid var(--border);
    }
    .penalties-table thead tr {
      background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
    }
    .penalties-table th {
      text-align: left; padding: 14px 18px;
      font-family: var(--font-head); font-size: 0.95rem;
      font-weight: 700; color: var(--gold-pale); letter-spacing: 0.5px;
    }
    .penalties-table td { padding: 12px 18px; border-bottom: 1px solid var(--border); }
    .penalties-table tbody tr { background: var(--surface); transition: background var(--transition); }
    .penalties-table tbody tr:hover { background: var(--surface2); }
    body.dark .penalties-table tbody tr { background: var(--surface3); }
    body.dark .penalties-table tbody tr:hover { background: var(--surface2); }
    .penalty-name-cell { font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; color: var(--navy-light); }
    body.dark .penalty-name-cell { color: var(--gold-pale); }
    .penalty-rank-cell { font-size: 0.82rem; color: var(--sky); font-weight: 500; }
    .penalty-x {
      color: var(--red-alert); font-weight: bold; font-size: 1.2rem;
      text-align: center; display: flex; align-items: center; justify-content: center;
    }
    .penalty-badge-p1 { background: rgba(192,57,43,.15); color: #e74c3c; border: 1px solid rgba(192,57,43,.3); }
    .penalty-badge-p2 { background: rgba(192,57,43,.25); color: #c0392b; border: 1px solid rgba(192,57,43,.4); }
    .penalty-badge-p3 { background: rgba(100,0,0,.3); color: #ff4444; border: 1px solid rgba(192,57,43,.6); }
    .penalty-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%; font-weight: 700; font-size: 1rem;
    }

    /* ── BLACKLIST TABLE ── */
    .blacklist-table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      border-radius: var(--radius-md); overflow: hidden;
      box-shadow: var(--shadow-sm); border: 1.5px solid rgba(192,57,43,.3);
    }
    .blacklist-table thead tr { background: linear-gradient(135deg, #3a0f0f, #5c1a1a); }
    .blacklist-table th {
      text-align: left; padding: 14px 18px;
      font-family: var(--font-head); font-size: 0.95rem;
      font-weight: 700; color: #fca5a5; letter-spacing: 0.5px;
    }
    .blacklist-table td { padding: 12px 18px; border-bottom: 1px solid rgba(192,57,43,.15); }
    .blacklist-table tbody tr { background: var(--surface); transition: background var(--transition); }
    .blacklist-table tbody tr:hover { background: rgba(192,57,43,.04); }
    body.dark .blacklist-table tbody tr { background: var(--surface3); }

    /* ── GALLERY ── */
    .photo-gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px; margin-top: 16px;
    }
    .photo-gallery-img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover; border-radius: var(--radius-sm);
      cursor: pointer; transition: all var(--transition);
      border: 2px solid transparent;
    }
    .photo-gallery-img:hover {
      transform: scale(1.03);
      border-color: var(--gold);
      box-shadow: 0 8px 20px rgba(0,0,0,.2);
    }
    .gallery-filter-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 16px;
    }
    .gallery-filter-btn {
      font-family: var(--font-head); font-size: 0.9rem; font-weight: 600;
      padding: 6px 18px; border-radius: 99px;
      background: var(--surface2); color: var(--text-muted);
      border: 1.5px solid var(--border); cursor: pointer;
      transition: all var(--transition);
    }
    .gallery-filter-btn:hover, .gallery-filter-btn.active {
      background: var(--gold); color: var(--navy); border-color: var(--gold);
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.95);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; visibility: hidden; opacity: 0;
      transition: visibility var(--transition), opacity var(--transition);
    }
    .lightbox.active { visibility: visible; opacity: 1; }
    .lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; border-radius: var(--radius-sm); }
    .lightbox-close {
      position: absolute; top: 20px; right: 28px;
      font-size: 2.2rem; color: #fff; cursor: pointer;
      transition: all var(--transition); z-index: 10001;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { background: var(--gold); color: var(--navy); }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 1.6rem; color: #fff; cursor: pointer;
      background: rgba(255,255,255,.15); padding: 12px 16px;
      border-radius: 50%; transition: all var(--transition); z-index: 10002;
    }
    .lightbox-nav:hover { background: var(--gold); color: var(--navy); }
    .lightbox-nav.prev { left: 20px; }
    .lightbox-nav.next { right: 20px; }

    /* ── FORM IFRAME ── */
    .form-iframe {
      width: 100%; height: 2200px; border: none;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
    }

    /* ── FOOTER ── */
    .site-footer {
      background: var(--navy);
      color: #4d7a9c; padding: 1.4rem 2.8rem;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 2px solid var(--gold);
      font-family: var(--font-body); font-size: 0.82rem;
      gap: 12px; flex-wrap: wrap;
    }
    .footer-brand {
      font-family: var(--font-head); font-size: 1.1rem; font-weight: 700;
      color: var(--gold); letter-spacing: 1px;
    }
    .footer-links { display: flex; gap: 20px; }
    .footer-links span { cursor: default; transition: color var(--transition); }
    .footer-links span:hover { color: var(--gold); }

    /* ── LOGIN MODAL ── */
    .login-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 3000; visibility: hidden; opacity: 0; transition: all 0.2s;
    }
    .login-modal.show { visibility: visible; opacity: 1; }
    .login-card {
      background: var(--surface);
      max-width: 420px; width: 92%;
      border-radius: var(--radius-xl);
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      padding: 48px 40px; text-align: center;
      border: 1.5px solid var(--border);
    }
    body.dark .login-card { background: var(--surface2); border-color: var(--border); }
    .login-card .login-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
      border-radius: 50%; margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;

          <div class="subhead">Ελληνική Αστυνομία · Σύστημα Προσωπικού</div>
        </div>
      </div>
      <div class="rank-tag" id="rankTagDisplay"><i class="fas fa-star"></i> <span id="rankTagText">Σύστημα</span></div>
    </div>

    <!-- NAV TABS -->
    <div class="nav-tabs" id="mainNavTabs"></div>

    <!-- CONTENT -->
    <div class="content-area" id="mainContentArea"></div>

    <!-- FOOTER -->
    <div class="site-footer">
      <div class="footer-brand"><i class="fas fa-shield-alt"></i> ΕΛ.ΑΣ.</div>
      <div class="footer-links">
        <span id="footerYear"></span>
        <span id="footerOnlineCount"><i class="fas fa-circle" style="color:#22c55e;font-size:.6rem;"></i> Online</span>
      </div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="adminPanel" style="display:none">
    <div class="admin-header-modern">
      <h3><i class="fas fa-cog"></i> Πίνακας Ελέγχου</h3>
      <p>Διαχείριση περιεχομένου · Όλες οι αλλαγές αποθηκεύονται αυτόματα στο Firebase</p>
    </div>
    <div class="admin-content-modern" id="adminContentModern"></div>
  </div>
</div>

<!-- MOBILE ADMIN TOGGLE -->
<button class="admin-toggle-mobile" id="adminToggleMobile">
  <i class="fas fa-cog"></i> Admin
</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  // ── FIREBASE CONFIG (unchanged from original) ──
  const firebaseConfig = {
    apiKey: "AIzaSyBYourKeyHere",
    authDomain: "your-project.firebaseapp.com",
    projectId: "your-project",
    storageBucket: "your-project.appspot.com",
    messagingSenderId: "000000000000",
    appId: "1:000000000000:web:0000000000000000"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const storage = getStorage(app);

  const contentDocRef = doc(db, 'siteData', 'main');
  let siteContent = {};
  let currentUser = null;
  let isAdmin = false;

  // DOM refs
  const adminPanel = document.getElementById('adminPanel');
  const authStatus = document.getElementById('authStatus');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const loginModal = document.getElementById('loginModal');
  const loginEmail = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const submitLogin = document.getElementById('submitLogin');
  const loginError = document.getElementById('loginError');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxClose = document.getElementById('lightboxClose');
  const lightboxPrev = document.getElementById('lightboxPrev');
  const lightboxNext = document.getElementById('lightboxNext');
  const mainNavTabs = document.getElementById('mainNavTabs');
  const mainContentArea = document.getElementById('mainContentArea');
  const adminContentModern = document.getElementById('adminContentModern');
  const rankTagText = document.getElementById('rankTagText');
  const toastWrap = document.getElementById('toastWrap');

  document.getElementById('footerYear').textContent = new Date().getFullYear();

  // ── TOAST ──
  function showToast(msg, type = '') {
    const t = document.createElement('div');
    t.className = 'toast' + (type ? ` ${type}` : '');
    const icon = type === 'error' ? 'fa-times-circle' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
    t.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
    toastWrap.appendChild(t);
    setTimeout(() => t.remove(), 2700);
  }

  // ── FIREBASE HELPERS ──
  function dismissLoadingScreen() {
    const ls = document.getElementById('loading-screen');
    if (ls && ls.style.display !== 'none') {
      ls.classList.add('hidden');
      setTimeout(() => { ls.style.display = 'none'; }, 900);
    }
  }

  async function loadContent() {
    try {
      const snap = await getDoc(contentDocRef);
      if (snap.exists()) {
        siteContent = snap.data();
      } else {
        siteContent = getDefaultContent();
        try { await setDoc(contentDocRef, siteContent); } catch {}
      }
      renderMain();
    } catch (e) {
      console.error('Load error:', e);
      siteContent = getDefaultContent();
      renderMain();
    } finally {
      dismissLoadingScreen();
    }
  }

  function getDefaultContent() {
    return {
      cover: { title: 'ΕΛ.ΑΣ.', subtitle: 'Σύστημα Διαχείρισης Προσωπικού', imgUrl: '', description: 'Καλωσήρθατε στην πλατφόρμα διαχείρισης.' },
      rankTag: 'Σύστημα Διαχείρισης',
      photoCategories: ['Γενικό', 'Εκπαίδευση', 'Εκδηλώσεις'],
      photos: [],
      formUrl: '',
      categories: []
    };
  }

  async function saveToFirebase() {
    try {
      await setDoc(contentDocRef, siteContent);
      // Flash save indicator
      document.querySelectorAll('.save-indicator').forEach(el => {
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
      });
    } catch (e) {
      showToast('Σφάλμα αποθήκευσης', 'error');
    }
  }

  async function checkIfAdmin(uid) {
    try {
      const snap = await getDoc(doc(db, 'admins', uid));
      return snap.exists();
    } catch { return false; }
  }

  async function logAction(action, description) {
    try {
      await addDoc(collection(db, 'activityLog'), {
        action, description,
        uid: currentUser?.uid || 'anonymous',
        email: currentUser?.email || 'guest',
        timestamp: serverTimestamp()
      });
    } catch (e) { /* silent */ }
  }

  async function verifyImportExportCode(code) {
    try {
      const snap = await getDoc(doc(db, 'settings', 'importExportCode'));
      if (snap.exists()) return snap.data().code === code;
      return false;
    } catch { return false; }
  }

  // ── RENDER MAIN (public view) ──
  function renderMain() {
    if (!siteContent || !siteContent.categories) return;
    rankTagText.textContent = siteContent.rankTag || 'Σύστημα';

    const visibleCats = siteContent.categories.filter(c => c.visible !== false);

    // Build nav tabs + pages
    const builtInPages = [
      { id: 'home', label: 'Αρχική', icon: 'fa-home' },
    ];
    const allPages = [...builtInPages];
    visibleCats.forEach((cat, i) => {
      const icons = { protocol:'fa-book', personnel:'fa-users', penalties:'fa-gavel', blacklist:'fa-ban', gallery:'fa-images', form:'fa-file-alt' };
      allPages.push({ id: 'cat_' + i, label: cat.title, icon: icons[cat.type] || 'fa-folder' });
    });

    // Render tabs
    mainNavTabs.innerHTML = allPages.map((p, i) => `
      <button class="nav-tab ${i===0?'active':''}" data-page="${p.id}">
        <i class="fas ${p.icon}"></i> ${p.label}
      </button>
    `).join('');

    // Render content pages
    let html = '';

    // HOME
    html += `<div class="page active-page" id="page-home">`;
    const cv = siteContent.cover || {};
    if (cv.imgUrl) {
      html += `
        <div class="cover-section">
          <img class="cover-img" src="${cv.imgUrl}" alt="Cover">
          <div class="cover-overlay">
            <div class="cover-title">${cv.title || 'ΕΛ.ΑΣ.'}<span> ${cv.subtitle || ''}</span></div>
            <div class="cover-desc">${cv.description || ''}</div>
          </div>
        </div>`;
    } else {
      html += `
        <div class="cover-bg-only">
          <div class="cover-title">${cv.title || 'ΕΛ.ΑΣ.'}<span> ${cv.subtitle || ''}</span></div>
          <div class="cover-desc" style="color:var(--text-muted);margin-top:10px">${cv.description || ''}</div>
        </div>`;
    }

    // Stats
    const totalPersonnel = siteContent.categories.filter(c=>c.type==='personnel').reduce((a,c)=>a+(c.officers||[]).length,0);
    const totalPenalties = siteContent.categories.filter(c=>c.type==='penalties').reduce((a,c)=>a+(c.penalties||[]).filter(p=>p.p1||p.p2||p.p3).length,0);
    const totalBlacklist = siteContent.categories.filter(c=>c.type==='blacklist').reduce((a,c)=>a+(c.blacklist||[]).length,0);
    const totalPhotos = (siteContent.photos||[]).length;

    html += `
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-users"></i></div>
          <div>
            <div class="stat-number">${totalPersonnel}</div>
            <div class="stat-label">Προσωπικό</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red"><i class="fas fa-gavel"></i></div>
          <div>
            <div class="stat-number">${totalPenalties}</div>
            <div class="stat-label">Πειθαρχικά</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon gold"><i class="fas fa-ban"></i></div>
          <div>
            <div class="stat-number">${totalBlacklist}</div>
            <div class="stat-label">Μαύρη Λίστα</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-images"></i></div>
          <div>
            <div class="stat-number">${totalPhotos}</div>
            <div class="stat-label">Φωτογραφίες</div>
          </div>
        </div>
      </div>`;

    // Welcome protocol cards from 'protocol' type categories that have no subcategory
    visibleCats.filter(c=>c.type==='protocol').slice(0,1).forEach(cat=>{
      html += `<div class="protocol-card"><div class="ql-display">${cat.content||''}</div></div>`;
    });

    html += `</div>`;

    // CATEGORY PAGES
    visibleCats.forEach((cat, i) => {
      html += `<div class="page" id="page-cat_${i}">`;
      html += `<h2><i class="fas ${getIconForType(cat.type)}"></i> ${cat.title}</h2>`;

      if (cat.type === 'protocol') {
        html += `<div class="protocol-card"><div class="ql-display">${cat.content||''}</div></div>`;
      }
      else if (cat.type === 'personnel') {
        const officers = cat.officers || [];
        html += `
          <div class="search-bar-wrap">
            <i class="fas fa-search"></i>
            <input class="search-bar" type="text" placeholder="Αναζήτηση αξιωματικού..." oninput="filterOfficers(this,'officers_grid_${i}')">
          </div>
          <div class="officers-grid" id="officers_grid_${i}">`;
        officers.forEach(o => {
          const fullname = `${o.firstName||''} ${o.lastName||''}`.trim();
          html += `
            <div class="officer-display-card" data-search="${fullname.toLowerCase()} ${(o.rank||'').toLowerCase()}">
              <img class="officer-avatar" src="${o.photoUrl||'https://ui-avatars.com/api/?name='+encodeURIComponent(fullname)+'&background=0d2240&color=f5c518&size=128'}" alt="${fullname}"
                onclick="showLightbox('${o.photoUrl||''}')">
              <div class="officer-info">
                <div class="name">${fullname}</div>
                <div class="rank">${o.rank||''}</div>
                ${o.discord ? `<div class="discord"><i class="fab fa-discord"></i>${o.discord}</div>` : ''}
              </div>
            </div>`;
        });
        html += `</div>`;
      }
      else if (cat.type === 'penalties') {
        const penalties = cat.penalties || [];
        html += `
          <div class="search-bar-wrap">
            <i class="fas fa-search"></i>
            <input class="search-bar" type="text" placeholder="Αναζήτηση ονόματος..." oninput="filterPenalties(this,'penalties_tbl_${i}')">
          </div>
          <table class="penalties-table" id="penalties_tbl_${i}">
            <thead><tr>
              <th>Όνομα</th>
              <th style="text-align:center">Πειθαρχικό 1</th>
              <th style="text-align:center">Πειθαρχικό 2</th>
              <th style="text-align:center">Πειθαρχικό 3</th>
            </tr></thead><tbody>`;
        penalties.forEach(p => {
          html += `
            <tr data-search="${(p.name||'').toLowerCase()}">
              <td>
                <div class="penalty-name-cell">${p.name||''}</div>
                ${p.rank ? `<div class="penalty-rank-cell">${p.rank}</div>` : ''}
              </td>
              <td style="text-align:center">${p.p1 ? `<span class="penalty-badge penalty-badge-p1">✗</span>` : ''}</td>
              <td style="text-align:center">${p.p2 ? `<span class="penalty-badge penalty-badge-p2">✗</span>` : ''}</td>
              <td style="text-align:center">${p.p3 ? `<span class="penalty-badge penalty-badge-p3">✗</span>` : ''}</td>
            </tr>`;
        });
        html += `</tbody></table>`;
      }
      else if (cat.type === 'blacklist') {
        const bl = cat.blacklist || [];
        html += `
          <div class="search-bar-wrap">
            <i class="fas fa-search"></i>
            <input class="search-bar" type="text" placeholder="Αναζήτηση..." oninput="filterBlacklist(this,'blacklist_tbl_${i}')">
          </div>
          <table class="blacklist-table" id="blacklist_tbl_${i}">
            <thead><tr>
              <th>Όνομα</th><th>Βαθμός</th><th>Ημ/νία Αποχώρησης</th><th>Αιτία</th>
            </tr></thead><tbody>`;
        bl.forEach(b => {
          html += `
            <tr data-search="${(b.name||'').toLowerCase()} ${(b.reason||'').toLowerCase()}">
              <td style="font-weight:700;color:#fca5a5">${b.name||''}</td>
              <td style="color:var(--sky)">${b.rank||''}</td>
              <td style="color:var(--text-muted)">${b.dismissalDate||''}</td>
              <td>${b.reason||''}</td>
            </tr>`;
        });
        html += `</tbody></table>`;
      }
      else if (cat.type === 'gallery') {
        const photos = siteContent.photos || [];
        const categories = siteContent.photoCategories || [];
        const allUrls = photos.map(p => p.url);
        html += `
          <div class="gallery-filter-bar" id="gallery_filters_${i}">
            <button class="gallery-filter-btn active" data-cat="all" onclick="filterGallery(this,'gallery_grid_${i}','all')">
              <i class="fas fa-th"></i> Όλα
            </button>
            ${categories.map(c=>`
              <button class="gallery-filter-btn" data-cat="${c}" onclick="filterGallery(this,'gallery_grid_${i}','${c}')">
                ${c}
              </button>`).join('')}
          </div>
          <div class="photo-gallery-grid" id="gallery_grid_${i}">`;
        photos.forEach((p, idx) => {
          html += `<img class="photo-gallery-img" src="${p.url}" data-cats='${JSON.stringify(p.categories||[])}' 
            onclick="showLightbox('${p.url}', ${JSON.stringify(allUrls)}, ${idx})">`;
        });
        html += `</div>`;
      }
      else if (cat.type === 'form') {
        const url = siteContent.formUrl || cat.formUrl || '';
        html += url ? `<iframe class="form-iframe" src="${url}" allowfullscreen></iframe>` : '<p style="color:var(--text-muted)">Δεν έχει οριστεί φόρμα.</p>';
      }
      html += `</div>`;
    });

    mainContentArea.innerHTML = html;

    // Tab click events
    mainNavTabs.querySelectorAll('.nav-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        mainNavTabs.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
        mainContentArea.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        btn.classList.add('active');
        const pg = document.getElementById('page-' + btn.dataset.page);
        if (pg) pg.classList.add('active-page');
      });
    });
  }

  function getIconForType(type) {
    const m = { protocol:'fa-book-open', personnel:'fa-users', penalties:'fa-gavel', blacklist:'fa-ban', gallery:'fa-images', form:'fa-file-alt' };
    return m[type] || 'fa-folder';
  }

  // ── SEARCH FILTERS ──
  window.filterOfficers = function(input, gridId) {
    const q = input.value.toLowerCase();
    document.querySelectorAll(`#${gridId} .officer-display-card`).forEach(el => {
      el.style.display = el.dataset.search.includes(q) ? '' : 'none';
    });
  };
  window.filterPenalties = function(input, tblId) {
    const q = input.value.toLowerCase();
    document.querySelectorAll(`#${tblId} tbody tr`).forEach(el => {
      el.style.display = (el.dataset.search||'').includes(q) ? '' : 'none';
    });
  };
  window.filterBlacklist = window.filterPenalties;
  window.filterGallery = function(btn, gridId, cat) {
    document.querySelectorAll(`#${gridId}`).forEach(() => {});
    const btns = btn.closest('.gallery-filter-bar').querySelectorAll('.gallery-filter-btn');
    btns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll(`#${gridId} img`).forEach(img => {
      if (cat === 'all') { img.style.display = ''; return; }
      let cats = [];
      try { cats = JSON.parse(img.dataset.cats || '[]'); } catch {}
      img.style.display = cats.includes(cat) ? '' : 'none';
    });
  };

  // ── ADMIN PANEL RENDER ──
  function renderAdminPanel() {
    if (!isAdmin) return;
    let html = '';

    // Save indicator
    html += `<div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <span class="save-indicator" id="saveIndicator"><i class="fas fa-check"></i> Αποθηκεύτηκε</span>
    </div>`;

    // === COVER ===
    html += `
      <div class="admin-section-modern">
        <div class="admin-section-title"><i class="fas fa-image"></i> Εξώφυλλο & Τίτλος</div>
        <div class="admin-field-group"><label>Τίτλος Σελίδας</label>
          <input id="cvTitle" value="${escHtml(siteContent.cover?.title||'')}" placeholder="ΕΛ.ΑΣ.">
        </div>
        <div class="admin-field-group"><label>Υπότιτλος</label>
          <input id="cvSubtitle" value="${escHtml(siteContent.cover?.subtitle||'')}" placeholder="Σύστημα Διαχείρισης">
        </div>
        <div class="admin-field-group"><label>Περιγραφή</label>
          <textarea id="cvDesc" rows="2">${escHtml(siteContent.cover?.description||'')}</textarea>
        </div>
        <div class="admin-field-group"><label>URL Φωτογραφίας Εξώφυλλου</label>
          <input id="cvImg" value="${escHtml(siteContent.cover?.imgUrl||'')}" placeholder="https://...">
        </div>
        <div class="admin-field-group"><label>Rank Tag (πάνω δεξιά)</label>
          <input id="rankTagInput" value="${escHtml(siteContent.rankTag||'')}" placeholder="Αρχηγός">
        </div>
        <button class="btn btn-gold btn-full" id="saveCoverBtn"><i class="fas fa-save"></i> Αποθήκευση Εξώφυλλου</button>
      </div>`;

    // === CATEGORIES ===
    html += `
      <div class="admin-section-modern">
        <div class="admin-section-title"><i class="fas fa-layer-group"></i> Κατηγορίες (${(siteContent.categories||[]).length})</div>
        <div id="categoriesContainer">`;

    (siteContent.categories||[]).forEach((cat, idx) => {
      html += renderCategoryAdmin(cat, idx);
    });

    html += `</div>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <button class="btn btn-gold btn-sm" id="addCatBtn"><i class="fas fa-plus"></i> Νέα Κατηγορία</button>
          <button class="btn btn-ghost btn-sm" id="saveCatsBtn"><i class="fas fa-save"></i> Αποθήκευση</button>
        </div>
      </div>`;

    // === FORM URL ===
    html += `
      <div class="admin-section-modern">
        <div class="admin-section-title"><i class="fas fa-file-alt"></i> Google Form URL</div>
        <div class="admin-field-group">
          <input id="formUrlInput" value="${escHtml(siteContent.formUrl||'')}" placeholder="https://docs.google.com/forms/...">
        </div>
        <button class="btn btn-gold btn-full" id="saveFormBtn"><i class="fas fa-save"></i> Αποθήκευση</button>
      </div>`;

    // === GALLERY ===
    html += `
      <div class="admin-section-modern">
        <div class="admin-section-title"><i class="fas fa-images"></i> Γκαλερί & Κατηγορίες</div>
        <div class="admin-field-group"><label>Κατηγορίες (μία ανά γραμμή)</label>
          <textarea id="photoCatInput" rows="3">${(siteContent.photoCategories||[]).join('\n')}</textarea>
        </div>
        <button class="btn btn-sky btn-sm" id="savePhotoCatsBtn" style="margin-bottom:14px"><i class="fas fa-save"></i> Αποθήκευση Κατηγοριών</button>
        <div class="admin-field-group"><label>Κατηγορίες φωτογραφίας</label>
          <div class="photo-cat-checkboxes" id="photoCatCheckboxes"></div>
        </div>
        <div class="admin-field-group"><label>URL Φωτογραφίας</label>
          <input id="photoUrlInput" placeholder="https://...">
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <button class="btn btn-gold btn-sm" id="addPhotoByUrl"><i class="fas fa-link"></i> Προσθήκη URL</button>
          <button class="btn btn-sky btn-sm" id="uploadPhotoBtn"><i class="fas fa-upload"></i> Μεταφόρτωση</button>
          <input type="file" id="photoFileInput" accept="image/*" style="display:none">
        </div>
        <div class="photo-grid-admin" id="photosAdminGrid"></div>
      </div>`;

    // === CSV EXPORT ===
    html += `
      <div class="admin-section-modern">
        <div class="admin-section-title"><i class="fas fa-download"></i> Εξαγωγή CSV</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" id="exportPersonnelCSV"><i class="fas fa-users"></i> Προσωπικό</button>
          <button class="btn btn-ghost btn-sm" id="exportPenaltiesCSV"><i class="fas fa-gavel"></i> Πειθαρχικά</button>
          <button class="btn btn-ghost btn-sm" id="exportBlacklistCSV"><i class="fas fa-ban"></i> Μαύρη Λίστα</button>
        </div>
      </div>`;

    // === EXPORT/IMPORT ===
    html += `
      <div class="admin-section-modern">
        <div class="admin-section-title"><i class="fas fa-database"></i> Εξαγωγή / Εισαγωγή Δεδομένων</div>
        <div class="export-import-wrap">
          <input type="password" id="codeInputSec" placeholder="Κωδικός ασφαλείας">
          <div class="btn-row">
            <button class="btn btn-sky btn-sm" id="exportBtn"><i class="fas fa-file-export"></i> Export JSON</button>
            <button class="btn btn-red btn-sm" id="importBtn"><i class="fas fa-file-import"></i> Import JSON</button>
          </div>
        </div>
        <div id="statusMsg"><i class="fas fa-info-circle"></i> Απαιτείται κωδικός από το έγγραφο settings/importExportCode</div>
      </div>`;

    // === ACTIVITY LOG ===
    html += `
      <div class="admin-section-modern">
        <div class="admin-section-title"><i class="fas fa-history"></i> Ιστορικό Ενεργειών</div>
        <div class="action-log" id="actionLog">Φόρτωση...</div>
      </div>`;

    adminContentModern.innerHTML = html;
    bindAdminEvents();
    renderPhotosAdmin();
    loadActivityLog();
  }

          <select class="category-type-select" data-idx="${idx}" data-field="type">
            ${typeOptions.map(t=>`<option value="${t}"${cat.type===t?' selected':''}>${typeLabels[t]}</option>`).join('')}

            <label for="vis_${idx}">Ορατό</label>

    else if (cat.type === 'penalties') {
      html += `<div class="penalties-admin-grid" id="penaltiesAdmin_${idx}">`;
      (cat.penalties||[]).forEach((p, pi) => {
        html += renderPenaltyAdmin(idx, pi, p);
      });
      html += `</div>
        <button class="btn btn-sky btn-sm" data-addpenalty="${idx}"><i class="fas fa-plus"></i> Νέο Πειθαρχικό</button>`;
    }
    else if (cat.type === 'blacklist') {
      html += `<div class="blacklist-admin-grid" id="blacklistAdmin_${idx}">`;
      (cat.blacklist||[]).forEach((b, bi) => {
        html += renderBlacklistAdmin(idx, bi, b);
      });
      html += `</div>
        <button class="btn btn-red btn-sm" data-addblacklist="${idx}"><i class="fas fa-plus"></i> Νέα Εγγραφή</button>`;
    }
    else if (cat.type === 'gallery') {
      html += `<p style="color:#6b91b5;font-size:0.85rem">Η γκαλερί διαχειρίζεται από την ενότητα "Γκαλερί" παρακάτω.</p>`;
    }
    else if (cat.type === 'form') {
      html += `<p style="color:#6b91b5;font-size:0.85rem">Το URL της φόρμας διαχειρίζεται από την ενότητα "Google Form URL" παρακάτω.</p>`;
    }

    html += `</div></div>`;
    return html;
  }

  function renderPhotosAdmin() {
    const grid = document.getElementById('photosAdminGrid');
    if (!grid) return;
    const photos = siteContent.photos || [];
    grid.innerHTML = photos.map((p, i) => `
      <div class="photo-admin-item">
        <img src="${p.url}" alt="">
        <button class="del-photo-btn" data-photoidx="${i}"><i class="fas fa-times"></i></button>
      </div>`).join('');
    grid.querySelectorAll('.del-photo-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        siteContent.photos.splice(parseInt(btn.dataset.photoidx), 1);
        renderMain(); saveToFirebase(); renderAdminPanel();
      });
    });

    // Rebuild checkboxes
    const checkboxesDiv = document.getElementById('photoCatCheckboxes');
    if (checkboxesDiv) {
      const categories = siteContent.photoCategories || [];
      checkboxesDiv.innerHTML = categories.map(cat => `
        <label>
          <input type="checkbox" value="${cat}"><span>${cat}</span>
        </label>`).join('');

  async function loadActivityLog() {
    const logDiv = document.getElementById('actionLog');
    if (!logDiv) return;
    try {
      const q = query(collection(db, 'activityLog'), orderBy('timestamp', 'desc'), limit(20));
      const snap = await (await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")).getDocs(q);
      if (snap.empty) { logDiv.innerHTML = '<div class="log-entry">Δεν υπάρχουν εγγραφές.</div>'; return; }
      logDiv.innerHTML = snap.docs.map(d => {
        const data = d.data();
        const time = data.timestamp?.toDate ? data.timestamp.toDate().toLocaleString('el-GR') : '—';
        return `<div class="log-entry"><span>[${time}]</span> ${data.email||'?'} → ${data.description||data.action}</div>`;
      }).join('');
    } catch (e) {
      logDiv.innerHTML = '<div class="log-entry" style="color:#ef4444">Δεν ήταν δυνατή η φόρτωση ιστορικού.</div>';
    }
  }

  // ── BIND ADMIN EVENTS ──
  function bindAdminEvents() {
    // Cover save
    document.getElementById('saveCoverBtn')?.addEventListener('click', () => {
      siteContent.cover = siteContent.cover || {};
      siteContent.cover.title = document.getElementById('cvTitle').value;
      siteContent.cover.subtitle = document.getElementById('cvSubtitle').value;
      siteContent.cover.description = document.getElementById('cvDesc').value;
      siteContent.cover.imgUrl = document.getElementById('cvImg').value;
      siteContent.rankTag = document.getElementById('rankTagInput').value;
      renderMain(); saveToFirebase();
      showToast('Εξώφυλλο αποθηκεύτηκε!', 'success');
    });

    // Form URL save
    document.getElementById('saveFormBtn')?.addEventListener('click', () => {
      siteContent.formUrl = document.getElementById('formUrlInput').value;
      saveToFirebase();
      showToast('URL φόρμας αποθηκεύτηκε!', 'success');
    });

    // Photo categories save
    document.getElementById('savePhotoCatsBtn')?.addEventListener('click', () => {
      const raw = document.getElementById('photoCatInput').value;
      siteContent.photoCategories = raw.split('\n').map(s=>s.trim()).filter(Boolean);
      renderMain(); saveToFirebase(); renderAdminPanel();
      showToast('Κατηγορίες γκαλερί αποθηκεύτηκαν!', 'success');
    });

    // Add category
    document.getElementById('addCatBtn')?.addEventListener('click', () => {
      if (!siteContent.categories) siteContent.categories = [];
      siteContent.categories.push({ title: 'Νέα Κατηγορία', type: 'protocol', visible: true, content: '' });
      renderMain(); saveToFirebase(); renderAdminPanel();
    });

    // Save categories (delegate input changes)
    const catContainer = document.getElementById('categoriesContainer');
    if (catContainer) {
      catContainer.addEventListener('input', e => {
        const el = e.target;
        const idx = parseInt(el.dataset.idx);
        const field = el.dataset.field;
        if (!isNaN(idx) && field && siteContent.categories[idx] !== undefined) {
          if (el.type === 'checkbox') {
            siteContent.categories[idx][field] = el.checked;
          } else {
            siteContent.categories[idx][field] = el.value;
          }
        }
        // Officer fields
        if (el.dataset.cat !== undefined && el.dataset.off !== undefined) {
          const catIdx = parseInt(el.dataset.cat);
          const offIdx = parseInt(el.dataset.off);
          const f = el.dataset.field;
          if (f && siteContent.categories[catIdx]?.officers?.[offIdx] !== undefined) {
            siteContent.categories[catIdx].officers[offIdx][f] = el.value;
            // Update photo preview
            if (f === 'photoUrl') {
              const prev = document.getElementById(`prevImg_${catIdx}_${offIdx}`);
              if (prev) prev.src = el.value || 'https://ui-avatars.com/api/?name=Officer&background=0d2240&color=f5c518';
            }
          }
        }
        // Penalty fields
        if (el.dataset.cat !== undefined && el.dataset.pen !== undefined) {
          const catIdx = parseInt(el.dataset.cat);
          const penIdx = parseInt(el.dataset.pen);
          const f = el.dataset.field;
          if (f && siteContent.categories[catIdx]?.penalties?.[penIdx] !== undefined) {
            siteContent.categories[catIdx].penalties[penIdx][f] = el.type === 'checkbox' ? el.checked : el.value;
          }
        }
        // Blacklist fields
        if (el.dataset.cat !== undefined && el.dataset.bl !== undefined) {
          const catIdx = parseInt(el.dataset.cat);
          const blIdx = parseInt(el.dataset.bl);
          const f = el.dataset.field;
          if (f && siteContent.categories[catIdx]?.blacklist?.[blIdx] !== undefined) {
            siteContent.categories[catIdx].blacklist[blIdx][f] = el.value;
          }
        }
      });

      catContainer.addEventListener('click', e => {
        const btn = e.target.closest('button, [data-addofficer], [data-delofficer], [data-addpenalty], [data-delpenalty], [data-addblacklist], [data-delbl]');
        if (!btn) return;

        // Category delete
        if (btn.dataset.idx !== undefined && btn.classList.contains('delete') && !btn.dataset.delofficer) {
          const idx = parseInt(btn.dataset.idx);
          if (confirm('Διαγραφή κατηγορίας;')) {
            siteContent.categories.splice(idx, 1);
            renderMain(); saveToFirebase(); renderAdminPanel();
          }
          return;
        }

        // Category move
        if (btn.dataset.move && btn.dataset.idx !== undefined) {
          const idx = parseInt(btn.dataset.idx);
          const dir = btn.dataset.move;
          const cats = siteContent.categories;
          if (dir === 'up' && idx > 0) { [cats[idx-1], cats[idx]] = [cats[idx], cats[idx-1]]; }
          if (dir === 'down' && idx < cats.length-1) { [cats[idx], cats[idx+1]] = [cats[idx+1], cats[idx]]; }
          renderMain(); saveToFirebase(); renderAdminPanel(); return;
        }

        // Add officer
        if (btn.dataset.addofficer !== undefined) {
          const ci = parseInt(btn.dataset.addofficer);
          if (!siteContent.categories[ci].officers) siteContent.categories[ci].officers = [];
          siteContent.categories[ci].officers.push({ firstName:'', lastName:'', rank:'Αστυφύλακας', discord:'', phone:'', email:'', photoUrl:'' });
          renderMain(); saveToFirebase(); renderAdminPanel(); return;
        }

        // Delete officer
        if (btn.dataset.delofficer !== undefined) {
          const ci = parseInt(btn.dataset.delofficer);
          const oi = parseInt(btn.dataset.offidx);
          siteContent.categories[ci].officers.splice(oi, 1);
          renderMain(); saveToFirebase(); renderAdminPanel(); return;
        }

        // Add penalty
        if (btn.dataset.addpenalty !== undefined) {
          const ci = parseInt(btn.dataset.addpenalty);
          if (!siteContent.categories[ci].penalties) siteContent.categories[ci].penalties = [];
          siteContent.categories[ci].penalties.push({ name:'', rank:'', p1:false, p2:false, p3:false });
          renderMain(); saveToFirebase(); renderAdminPanel(); return;
        }

        // Delete penalty
        if (btn.dataset.delpenalty !== undefined) {
          const ci = parseInt(btn.dataset.delpenalty);
          const pi = parseInt(btn.dataset.penidx);
          siteContent.categories[ci].penalties.splice(pi, 1);
          renderMain(); saveToFirebase(); renderAdminPanel(); return;
        }

        // Add blacklist
        if (btn.dataset.addblacklist !== undefined) {
          const ci = parseInt(btn.dataset.addblacklist);
          if (!siteContent.categories[ci].blacklist) siteContent.categories[ci].blacklist = [];
          siteContent.categories[ci].blacklist.push({ name:'', rank:'', dismissalDate:'', reason:'' });
          renderMain(); saveToFirebase(); renderAdminPanel(); return;
        }

        // Delete blacklist
        if (btn.dataset.delbl !== undefined) {
          const ci = parseInt(btn.dataset.delbl);
          const bi = parseInt(btn.dataset.blidx);
          siteContent.categories[ci].blacklist.splice(bi, 1);
          renderMain(); saveToFirebase(); renderAdminPanel(); return;
        }
      });
    }

    // Save all categories button
    document.getElementById('saveCatsBtn')?.addEventListener('click', () => {
      saveToFirebase();
      renderMain();
      showToast('Κατηγορίες αποθηκεύτηκαν!', 'success');
    });

    // Officer photo upload
    document.addEventListener('change', async (e) => {
      if (e.target.dataset.cat !== undefined && e.target.dataset.off !== undefined && e.target.type === 'file') {
        const file = e.target.files[0];
        const ci = parseInt(e.target.dataset.cat);
        const oi = parseInt(e.target.dataset.off);
        if (file && file.type.startsWith('image/')) {
          try {
            const storageRef = ref(storage, `officers/${Date.now()}_${file.name}`);
            const snap = await uploadBytes(storageRef, file);
            const url = await getDownloadURL(snap.ref);
            if (!siteContent.categories[ci].officers) siteContent.categories[ci].officers = [];
            siteContent.categories[ci].officers[oi] = siteContent.categories[ci].officers[oi] || {};
            siteContent.categories[ci].officers[oi].photoUrl = url;
            renderMain(); saveToFirebase(); renderAdminPanel();
            showToast('Φωτογραφία αξιωματικού ανέβηκε!', 'success');
          } catch (err) {
            showToast('Σφάλμα μεταφόρτωσης: ' + err.message, 'error');
          }
        }
      }
    }, true);

    // Gallery photo URL add
    const addPhotoByUrl = document.getElementById('addPhotoByUrl');
    const photoUrlInput = document.getElementById('photoUrlInput');
    if (addPhotoByUrl && photoUrlInput) {
      addPhotoByUrl.addEventListener('click', () => {
        const url = photoUrlInput.value.trim();
        const cats = getSelectedPhotoCategories();
        if (url) {
          if (!siteContent.photos) siteContent.photos = [];
          siteContent.photos.push({ url, categories: cats });
          renderMain(); saveToFirebase(); renderAdminPanel();
          photoUrlInput.value = '';
          showToast('Φωτογραφία προστέθηκε!', 'success');
        }
      });
    }

    // Gallery photo upload
    const uploadPhotoBtn = document.getElementById('uploadPhotoBtn');
    const photoFileInput = document.getElementById('photoFileInput');
    if (uploadPhotoBtn && photoFileInput) {
      uploadPhotoBtn.addEventListener('click', () => photoFileInput.click());
      photoFileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
          try {
            const storageRef = ref(storage, `gallery/${Date.now()}_${file.name}`);
            const snap = await uploadBytes(storageRef, file);
            const url = await getDownloadURL(snap.ref);
            const cats = getSelectedPhotoCategories();
            siteContent.photos = siteContent.photos || [];
            siteContent.photos.push({ url, categories: cats });
            renderMain(); saveToFirebase(); renderAdminPanel();
            photoFileInput.value = '';
            showToast('Φωτογραφία μεταφορτώθηκε!', 'success');
          } catch (err) {
            showToast('Σφάλμα: ' + err.message, 'error');
          }
        }
      });
    }

    function getSelectedPhotoCategories() {
      const checkboxesDiv = document.getElementById('photoCatCheckboxes');
      if (!checkboxesDiv) return [];
      return [...checkboxesDiv.querySelectorAll('input[type="checkbox"]:checked')].map(cb => cb.value);
    }

    // CSV Exports
    document.getElementById('exportPersonnelCSV')?.addEventListener('click', () => {
      let csv = "Όνομα,Επώνυμο,Βαθμός,Discord,Τηλέφωνο,Email\n";
      siteContent.categories.forEach(cat => {
        if (cat.type === 'personnel') cat.officers?.forEach(o => {
          csv += `"${o.firstName||''}","${o.lastName||''}","${o.rank||''}","${o.discord||''}","${o.phone||''}","${o.email||''}"\n`;
        });
      });
      downloadCSV(csv, 'personnel.csv');
    });
    document.getElementById('exportPenaltiesCSV')?.addEventListener('click', () => {
      let csv = "Όνομα,Βαθμός,Πειθαρχικό 1,Πειθαρχικό 2,Πειθαρχικό 3\n";
      siteContent.categories.forEach(cat => {
        if (cat.type === 'penalties') cat.penalties?.forEach(p => {
          csv += `"${p.name||''}","${p.rank||''}",${p.p1?'X':''},${p.p2?'X':''},${p.p3?'X':''}\n`;
        });
      });
      downloadCSV(csv, 'penalties.csv');
    });
    document.getElementById('exportBlacklistCSV')?.addEventListener('click', () => {
      let csv = "Όνομα,Βαθμός,Ημερομηνία Αποχώρησης,Αιτία\n";
      siteContent.categories.forEach(cat => {
        if (cat.type === 'blacklist') cat.blacklist?.forEach(b => {
          csv += `"${b.name||''}","${b.rank||''}","${b.dismissalDate||''}","${b.reason||''}"\n`;
        });
      });
      downloadCSV(csv, 'blacklist.csv');
    });

    function downloadCSV(csv, filename) {
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = filename; a.click(); URL.revokeObjectURL(a.href);
    }

    // Export/Import JSON
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const codeInputSec = document.getElementById('codeInputSec');
    const statusMsg = document.getElementById('statusMsg');

    exportBtn?.addEventListener('click', async () => {
      const code = codeInputSec.value;
      if (!code) { statusMsg.innerHTML = '<i class="fas fa-times-circle"></i> Εισάγετε τον κωδικό ασφαλείας.'; return; }
      const valid = await verifyImportExportCode(code);
      if (!valid) { statusMsg.innerHTML = '<i class="fas fa-ban"></i> Μη έγκυρος κωδικός.'; return; }
      const dataStr = JSON.stringify(siteContent, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `elas_backup_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
      statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Εξαγωγή ολοκληρώθηκε!';
      await logAction('export_data', 'Εξαγωγή δεδομένων JSON');
    });

    importBtn?.addEventListener('click', async () => {
      const code = codeInputSec.value;
      if (!code) { statusMsg.innerHTML = '<i class="fas fa-times-circle"></i> Εισάγετε τον κωδικό ασφαλείας.'; return; }
      const valid = await verifyImportExportCode(code);
      if (!valid) { statusMsg.innerHTML = '<i class="fas fa-ban"></i> Μη έγκυρος κωδικός.'; return; }
      const fi = document.createElement('input'); fi.type = 'file'; fi.accept = 'application/json';
      fi.onchange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!imported.categories || !imported.cover) throw new Error('Μη έγκυρη δομή αρχείου');
            siteContent = imported;
            await setDoc(contentDocRef, siteContent);
            renderMain(); renderAdminPanel();
            statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> Εισαγωγή επιτυχής!';
            await logAction('import_data', 'Εισαγωγή δεδομένων JSON');
          } catch (err) {
            statusMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Σφάλμα: ' + err.message;
          }
        };
        reader.readAsText(file);
      };
      fi.click();
    });

    // Init Quill editors after render
    setTimeout(() => {
      (siteContent.categories||[]).forEach((cat, idx) => {
        if (cat.type === 'protocol') {
          const container = document.getElementById(`quillEditor_${idx}`);
          if (container && !container._quill) {
            const q = new Quill(container, { theme: 'snow' });
            container._quill = q;
            q.on('text-change', () => {
              siteContent.categories[idx].content = q.root.innerHTML;
            });
          }
        }
      });
    }, 100);
  }

  // ── LIGHTBOX ──
  let currentGalleryImages = [];
  let currentGalleryIndex = 0;
  window.showLightbox = function(src, allImages = null, startIndex = 0) {
    if (allImages && allImages.length) {
      currentGalleryImages = allImages;
      currentGalleryIndex = startIndex;
      lightboxImg.src = currentGalleryImages[currentGalleryIndex];
    } else {
      currentGalleryImages = [];
      lightboxImg.src = src;
    }
    lightbox.classList.add('active');
  };
  function updateLightboxImage() { if (currentGalleryImages.length) lightboxImg.src = currentGalleryImages[currentGalleryIndex]; }
  function nextImage() { if (currentGalleryImages.length) { currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryImages.length; updateLightboxImage(); } }
  function prevImage() { if (currentGalleryImages.length) { currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length; updateLightboxImage(); } }
  function hideLightbox() { lightbox.classList.remove('active'); lightboxImg.src = ''; currentGalleryImages = []; }
  lightboxClose.addEventListener('click', hideLightbox);
  lightboxPrev.addEventListener('click', prevImage);
  lightboxNext.addEventListener('click', nextImage);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) hideLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'ArrowRight') nextImage();
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'Escape') hideLightbox();
  });

  // ── AUTH ──
  try {
    onAuthStateChanged(auth, async (user) => {
      try {
        currentUser = user;
        if (user) {
          authStatus.innerHTML = `<i class="fas fa-user-shield"></i> ${user.email}`;
          loginBtn.style.display = 'none';
          logoutBtn.style.display = 'inline-flex';
          isAdmin = await checkIfAdmin(user.uid);
          adminPanel.style.display = isAdmin ? 'flex' : 'none';
          await loadContent();
          if (isAdmin) { renderAdminPanel(); await logAction('login', 'Σύνδεση διαχειριστή'); }
        } else {
          authStatus.innerHTML = '<i class="fas fa-circle" style="color:#475569;font-size:.65rem;"></i> Επισκέπτης';
          loginBtn.style.display = 'inline-flex';
          logoutBtn.style.display = 'none';
          adminPanel.style.display = 'none';
          isAdmin = false;
          await loadContent();
        }
      } catch (innerErr) {
        console.error('Auth inner error:', innerErr);
        siteContent = getDefaultContent();
        renderMain();
      }
    });
  } catch (authErr) {
    console.error('Firebase auth error:', authErr);
    siteContent = getDefaultContent();
    renderMain();
  }

  loginBtn.addEventListener('click', () => loginModal.classList.add('show'));
  submitLogin.addEventListener('click', async () => {
    loginError.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
      loginModal.classList.remove('show');
    } catch {
      loginError.textContent = 'Λάθος email ή κωδικός';
    }
  });
  loginPassword.addEventListener('keydown', e => { if (e.key === 'Enter') submitLogin.click(); });
  logoutBtn.addEventListener('click', async () => { await signOut(auth); showToast('Αποσύνδεση επιτυχής'); });
  loginModal.addEventListener('click', (e) => { if (e.target === loginModal) loginModal.classList.remove('show'); });

  // ── DARK MODE ──
  document.getElementById('darkModeToggle').addEventListener('click', () => {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('darkMode', isDark);
    document.getElementById('darkModeToggle').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  });
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-sun"></i>';
  }

  // ── MOBILE ADMIN TOGGLE ──
  document.getElementById('adminToggleMobile').addEventListener('click', () => adminPanel.classList.toggle('open'));

  // ── UTIL ──
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

</script>

<!-- Loading screen dismissal lives OUTSIDE the module so it always runs even if Firebase errors -->
<script>
  function dismissLoading() {
    const ls = document.getElementById('loading-screen');
    if (ls) {
      ls.classList.add('hidden');
      setTimeout(() => { ls.style.display = 'none'; }, 900);
    }
  }
  // Dismiss after max 4 seconds no matter what
  setTimeout(dismissLoading, 4000);
  // Also dismiss as soon as DOM content is interactive
  window.addEventListener('load', () => setTimeout(dismissLoading, 800));
</script>
</body>
</html>
